name: validate

on:
  pull_request:
    paths:
      - "memoria/**"
      - "matrixorigin/**"
      - "schema/**"
      - "scripts/**"
      - "package.json"
      - "tsconfig.json"
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile=false

      - name: Validate frontmatter
        run: pnpm validate
