name: dispatch-memoria-deploy

# Fires when content under memoria/ is pushed to main.
# Only dispatches to memoria-website if at least one changed index.md
# currently has `status: "published"` (or unpublishes a previously published post).
#
# Required secret:
#   MEMORIA_WEBSITE_PAT — GitHub PAT with `repo` scope on
#                         matrixorigin/memoria-website (for repository_dispatch)

on:
  push:
    branches: [main]
    paths:
      - "memoria/**"
  workflow_dispatch:          # manual trigger, always dispatches

jobs:
  check-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2      # need HEAD~1 to diff changed files

      - name: Detect published-post changes
        id: check
        # Skip status check on manual runs — always deploy.
        if: github.event_name != 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail

          CHANGED=$(git diff --name-only HEAD~1 HEAD -- memoria/ 2>/dev/null || true)
          echo "Changed files under memoria/:"
          echo "${CHANGED:-  (none)}"

          SHOULD_DEPLOY=false

          while IFS= read -r f; do
            [[ -z "$f" ]]            && continue
            [[ "$f" != */index.md ]] && continue

            if [[ -f "$f" ]]; then
              # File exists → check current status
              if grep -qE '^status:\s+"?published"?' "$f"; then
                echo "Published post changed: $f"
                SHOULD_DEPLOY=true
                break
              fi
            else
              # File deleted → check previous status (unpublish triggers rebuild too)
              if git show "HEAD~1:${f}" 2>/dev/null | grep -qE '^status:\s+"?published"?'; then
                echo "Published post removed: $f"
                SHOULD_DEPLOY=true
                break
              fi
            fi
          done <<< "$CHANGED"

          echo "should_deploy=${SHOULD_DEPLOY}" >> "$GITHUB_OUTPUT"
          echo "Result: should_deploy=${SHOULD_DEPLOY}"

      - name: Dispatch to memoria-website
        # Run when: manual trigger (no check step) OR status check says yes
        if: >
          github.event_name == 'workflow_dispatch' ||
          steps.check.outputs.should_deploy == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MEMORIA_WEBSITE_PAT }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'matrixorigin',
              repo:  'memoria-website',
              event_type: 'blog-content-updated',
              client_payload: {
                sha:     context.sha,
                ref:     context.ref,
                message: context.payload?.head_commit?.message ?? 'manual dispatch',
              },
            })
            core.info(`Dispatched blog-content-updated → matrixorigin/memoria-website @ ${context.sha}`)
