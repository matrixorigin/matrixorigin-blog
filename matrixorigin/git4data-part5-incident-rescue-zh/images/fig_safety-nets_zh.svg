<svg viewBox="0 0 1200 460" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#161B22" stroke-width="1"/></pattern>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0L7 3L0 6Z" fill="#6E7681"/></marker>
    <marker id="arrb" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0L7 3L0 6Z" fill="#1F6FEB"/></marker>
    <style>.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;} .h{fill:#E6EDF3;} .m{fill:#9DA7B3;} .dim{fill:#6E7681;}</style>
  </defs>
  <rect width="1200" height="460" fill="#0D1117"/><rect width="1200" height="460" fill="url(#g)"/>
  <text x="70" y="50" class="h" font-size="24" font-weight="700">两层安全网：持久的手动快照 + 滚动的后台 PITR</text>

  <!-- timeline -->
  <line x1="110" y1="220" x2="1130" y2="220" stroke="#30363D" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="1128" y="206" class="dim" font-size="12" text-anchor="end">时间 →</text>

  <!-- now -->
  <line x1="1050" y1="135" x2="1050" y2="330" stroke="#9DA7B3" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="1050" y="348" class="m" font-size="12" text-anchor="middle" font-weight="700">现在</text>

  <!-- rolled-off zone (left of the window) -->
  <rect x="300" y="250" width="418" height="66" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="509" y="279" class="dim" font-size="13" text-anchor="middle" font-weight="700">已滑出窗口</text>
  <text x="509" y="300" class="dim" font-size="12" text-anchor="middle">这段时间 PITR 不再保证可恢复</text>

  <!-- PITR rolling window -->
  <rect x="722" y="250" width="328" height="66" rx="8" fill="#10233F" stroke="#1F6FEB" stroke-width="1.6"/>
  <text x="886" y="279" fill="#79C0FF" font-size="14" font-weight="700" text-anchor="middle">PITR 滚动窗口（最近 1 天 = RANGE）</text>
  <text x="886" y="300" class="dim" font-size="11.5" text-anchor="middle">窗内任意一秒可恢复，连误删都兜得住</text>
  <!-- trailing edge of window -->
  <line x1="722" y1="244" x2="722" y2="322" stroke="#1F6FEB" stroke-width="1.4" stroke-dasharray="3 3"/>
  <text x="722" y="338" fill="#79C0FF" font-size="11" text-anchor="middle">现在 − 1 天</text>
  <!-- window slides forward -->
  <line x1="812" y1="338" x2="900" y2="338" stroke="#1F6FEB" stroke-width="1.3" marker-end="url(#arrb)" opacity="0.85"/>
  <text x="965" y="342" fill="#79C0FF" font-size="11.5" text-anchor="middle">窗口随时间不断前移</text>

  <!-- snapshot label -->
  <text x="470" y="126" fill="#A371F7" font-size="12" text-anchor="middle">CREATE SNAPSHOT（手动 · 持久）</text>

  <!-- snapshot 1: rolled-off in time, but still valid -->
  <g>
    <rect x="434" y="138" width="72" height="30" rx="4" fill="#161B22" stroke="#8957E5" stroke-width="1.3"/>
    <text x="470" y="158" class="m" font-size="12" text-anchor="middle">上线前</text>
    <line x1="470" y1="168" x2="470" y2="220" stroke="#8957E5" stroke-width="1.5"/>
    <circle cx="470" cy="220" r="4" fill="#8957E5"/>
  </g>
  <!-- durability callout -->
  <line x1="470" y1="316" x2="470" y2="356" stroke="#3FB950" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="470" y="374" fill="#3FB950" font-size="12.5" text-anchor="middle" font-weight="700">快照不过期</text>
  <text x="470" y="392" fill="#3FB950" font-size="11" text-anchor="middle">窗口滑过后，照样能 DIFF / 恢复</text>

  <!-- snapshot 2: inside the window -->
  <g>
    <rect x="929" y="138" width="72" height="30" rx="4" fill="#161B22" stroke="#8957E5" stroke-width="1.3"/>
    <text x="965" y="158" class="m" font-size="12" text-anchor="middle">改前</text>
    <line x1="965" y1="168" x2="965" y2="220" stroke="#8957E5" stroke-width="1.5"/>
    <circle cx="965" cy="220" r="4" fill="#8957E5"/>
  </g>

  <!-- incident -->
  <circle cx="1015" cy="220" r="8" fill="#F0883E"/>
  <text x="1015" y="200" fill="#F0883E" font-size="13" text-anchor="middle" font-weight="700">事故 💥</text>

  <!-- legend -->
  <rect x="70" y="430" width="20" height="14" rx="3" fill="#161B22" stroke="#8957E5"/>
  <text x="100" y="442" class="m" font-size="13">快照 = 手动、持久、具名 → <tspan class="h" font-weight="700">定点修复 / DIFF</tspan>（不随时间过期）</text>
  <rect x="640" y="430" width="20" height="14" rx="3" fill="#10233F" stroke="#1F6FEB"/>
  <text x="670" y="442" class="m" font-size="13">PITR = 后台连续、向前滚动的短期窗 → <tspan class="h" font-weight="700">兜底</tspan>没存档的时刻 / 误删</text>
</svg>
