<svg viewBox="0 0 1200 440" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#161B22" stroke-width="1"/></pattern>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0L7 3L0 6Z" fill="#6E7681"/></marker>
    <style>.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;} .h{fill:#E6EDF3;} .m{fill:#9DA7B3;} .dim{fill:#6E7681;}</style>
  </defs>
  <rect width="1200" height="440" fill="#0D1117"/><rect width="1200" height="440" fill="url(#g)"/>
  <text x="70" y="56" class="h" font-size="24" font-weight="700">两层安全网：手动快照 + 后台 PITR</text>

  <!-- PITR continuous band -->
  <rect x="300" y="250" width="820" height="66" rx="8" fill="#10233F" stroke="#1F6FEB" stroke-width="1.5"/>
  <text x="316" y="276" fill="#79C0FF" font-size="14" font-weight="700">PITR 保护窗</text>
  <text x="316" y="300" class="dim" font-size="13">创建之后任意一秒可恢复 —— 连没存档的时刻、连被 DROP 的表都兜得住</text>

  <!-- timeline -->
  <line x1="110" y1="220" x2="1130" y2="220" stroke="#30363D" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="1128" y="206" class="dim" font-size="12" text-anchor="end">时间 →</text>

  <!-- PITR created tick -->
  <line x1="300" y1="210" x2="300" y2="250" stroke="#1F6FEB" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="300" y="340" fill="#79C0FF" font-size="12" text-anchor="middle">PITR 创建</text>

  <!-- snapshot pins (above the line) -->
  <g>
    <rect x="404" y="150" width="72" height="30" rx="4" fill="#161B22" stroke="#8957E5" stroke-width="1.3"/>
    <text x="440" y="170" class="m" font-size="12" text-anchor="middle">变更前</text>
    <line x1="440" y1="180" x2="440" y2="220" stroke="#8957E5" stroke-width="1.5"/>
    <circle cx="440" cy="220" r="4" fill="#8957E5"/>
  </g>
  <g>
    <rect x="604" y="150" width="72" height="30" rx="4" fill="#161B22" stroke="#8957E5" stroke-width="1.3"/>
    <text x="640" y="170" class="m" font-size="12" text-anchor="middle">ETL 前</text>
    <line x1="640" y1="180" x2="640" y2="220" stroke="#8957E5" stroke-width="1.5"/>
    <circle cx="640" cy="220" r="4" fill="#8957E5"/>
  </g>
  <g>
    <rect x="800" y="150" width="80" height="30" rx="4" fill="#161B22" stroke="#8957E5" stroke-width="1.3"/>
    <text x="840" y="170" class="m" font-size="12" text-anchor="middle">发版前</text>
    <line x1="840" y1="180" x2="840" y2="220" stroke="#8957E5" stroke-width="1.5"/>
    <circle cx="840" cy="220" r="4" fill="#8957E5"/>
  </g>
  <text x="440" y="138" fill="#A371F7" font-size="12" text-anchor="middle">CREATE SNAPSHOT</text>

  <!-- incident -->
  <circle cx="980" cy="220" r="8" fill="#F0883E"/>
  <text x="980" y="200" fill="#F0883E" font-size="13" text-anchor="middle" font-weight="700">事故 💥</text>

  <!-- legend -->
  <rect x="70" y="372" width="20" height="14" rx="3" fill="#161B22" stroke="#8957E5"/>
  <text x="100" y="384" class="m" font-size="13">快照 = 手动埋的精确存档点 → 可做<tspan class="h" font-weight="700">定点修复</tspan></text>
  <rect x="560" y="372" width="20" height="14" rx="3" fill="#10233F" stroke="#1F6FEB"/>
  <text x="590" y="384" class="m" font-size="13">PITR = 后台连续窗 → <tspan class="h" font-weight="700">兜底</tspan>没存档的时刻 / 误删</text>
</svg>
