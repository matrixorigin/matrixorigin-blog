<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#161B22" stroke-width="1"/></pattern>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0L7 3L0 6Z" fill="#6E7681"/></marker>
    <style>.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;} .h{fill:#E6EDF3;} .m{fill:#9DA7B3;} .dim{fill:#6E7681;}</style>
  </defs>
  <rect width="1200" height="600" fill="#0D1117"/><rect width="1200" height="600" fill="url(#g)"/>
  <text x="70" y="50" class="h" font-size="24" font-weight="700">出事之后：照这张决策树走</text>

  <!-- start -->
  <rect x="510" y="74" width="180" height="40" rx="20" fill="#1C2330" stroke="#6E7681"/>
  <text x="600" y="100" class="h" font-size="15" text-anchor="middle" font-weight="700">出事了</text>
  <line x1="600" y1="114" x2="600" y2="142" stroke="#6E7681" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- diamond 1: table still there? -->
  <polygon points="600,146 712,200 600,254 488,200" fill="#161B22" stroke="#1F6FEB" stroke-width="1.5"/>
  <text x="600" y="205" class="h" font-size="15" text-anchor="middle" font-weight="700">表还在吗？</text>

  <!-- NO -> PITR -->
  <line x1="712" y1="200" x2="888" y2="200" stroke="#6E7681" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="760" y="190" fill="#F0883E" font-size="13" font-weight="700">否（被 DROP）</text>
  <rect x="890" y="170" width="262" height="60" rx="8" fill="#10233F" stroke="#1F6FEB" stroke-width="1.5"/>
  <text x="908" y="197" class="h" font-size="15" font-weight="700">PITR 整库恢复</text>
  <text x="908" y="218" class="dim mono" font-size="12">RESTORE DATABASE … FROM PITR</text>

  <!-- YES -> DIFF -->
  <line x1="600" y1="254" x2="600" y2="288" stroke="#6E7681" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="616" y="276" fill="#3FB950" font-size="13" font-weight="700">是</text>
  <rect x="486" y="290" width="228" height="58" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
  <text x="600" y="316" class="h" font-size="15" text-anchor="middle" font-weight="700">先 DIFF 看清损失</text>
  <text x="600" y="337" class="dim mono" font-size="12" text-anchor="middle">DATA BRANCH DIFF … OUTPUT SUMMARY</text>

  <!-- DIFF -> diamond 2 -->
  <line x1="600" y1="348" x2="600" y2="378" stroke="#6E7681" stroke-width="1.5" marker-end="url(#arr)"/>
  <polygon points="600,382 730,432 600,482 470,432" fill="#161B22" stroke="#1F6FEB" stroke-width="1.5"/>
  <text x="600" y="430" class="h" font-size="14.5" text-anchor="middle" font-weight="700">事故后有</text>
  <text x="600" y="450" class="h" font-size="14.5" text-anchor="middle" font-weight="700">正常新写入？</text>

  <!-- NO -> full rollback -->
  <line x1="470" y1="432" x2="362" y2="432" stroke="#6E7681" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="416" y="422" fill="#9DA7B3" font-size="13" font-weight="700">否</text>
  <rect x="60" y="402" width="300" height="60" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
  <text x="78" y="429" class="h" font-size="15" font-weight="700">整表回滚（最简单）</text>
  <text x="78" y="450" class="dim mono" font-size="12">RESTORE TABLE … {SNAPSHOT=…}</text>

  <!-- YES -> surgical repair -->
  <line x1="600" y1="482" x2="600" y2="512" stroke="#6E7681" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="616" y="503" fill="#79C0FF" font-size="13" font-weight="700">是</text>
  <rect x="430" y="514" width="340" height="62" rx="8" fill="#10233F" stroke="#1F6FEB" stroke-width="1.8"/>
  <text x="448" y="541" class="h" font-size="15" font-weight="700">定点修复（保住新业务）</text>
  <text x="448" y="562" fill="#79C0FF" class="mono" font-size="12">克隆快照 + UPDATE … JOIN</text>

  <!-- side note -->
  <rect x="820" y="392" width="332" height="80" rx="8" fill="#1A1410" stroke="#6E2B25" stroke-width="1.2"/>
  <text x="838" y="418" fill="#F0883E" font-size="13" font-weight="700">特例：完全没有事前快照</text>
  <text x="838" y="440" class="dim" font-size="12.5">且是慢性脏写 → 只能 PITR 整库</text>
  <text x="838" y="459" class="dim" font-size="12.5">覆盖式回滚（连正常业务一起回，代价大）</text>
</svg>
