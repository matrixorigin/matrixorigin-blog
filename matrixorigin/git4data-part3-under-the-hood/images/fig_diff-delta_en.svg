<svg viewBox="0 0 1200 620" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#161B22" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1F6FEB" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1F6FEB" stop-opacity="0"/>
    </radialGradient>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0 0L7 3L0 6Z" fill="#6E7681"/>
    </marker>
    <style>
      .mono{font-family:ui-monospace,'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;}
      .h{fill:#E6EDF3;} .m{fill:#9DA7B3;} .dim{fill:#6E7681;}
      .plus{fill:#3FB950;} .minus{fill:#F0883E;}
    </style>
  </defs>

  <rect width="1200" height="620" fill="#0D1117"/>
  <rect width="1200" height="620" fill="url(#g)"/>
  <ellipse cx="600" cy="320" rx="420" ry="250" fill="url(#glow)"/>

  <text x="70" y="74" class="h" font-size="32" font-weight="700">Diff: read only "the objects that changed"</text>
  <text x="72" y="106" class="mono dim" font-size="16">scan only the delta objects, never the full tables</text>

  <rect x="500" y="150" width="200" height="48" rx="6" fill="#1C2330" stroke="#3B66B0"/>
  <text x="600" y="180" class="h mono" font-size="15" text-anchor="middle">common ancestor sn1</text>

  <text x="150" y="250" class="h" font-size="18" font-weight="700">branch sn2's &#916;</text>
  <text x="150" y="274" class="dim mono" font-size="13">objects sn2 has that sn1 doesn't</text>
  <g class="mono" font-size="15">
    <rect x="150" y="292" width="300" height="40" rx="5" fill="#13251A" stroke="#2EA043"/>
    <text x="168" y="318"><tspan class="plus" font-weight="700">+ </tspan><tspan class="h">insert row 1000001 (Frank)</tspan></text>
    <rect x="150" y="340" width="300" height="40" rx="5" fill="#2A1E16" stroke="#B0701F"/>
    <text x="168" y="366"><tspan class="minus" font-weight="700">&#177; </tspan><tspan class="h">update 5000&#8211;5999 (delete+insert)</tspan></text>
  </g>

  <text x="800" y="250" class="h" font-size="18" font-weight="700">branch sn3's &#916;</text>
  <text x="800" y="274" class="dim mono" font-size="13">objects sn3 has that sn1 doesn't</text>
  <g class="mono" font-size="15">
    <rect x="800" y="292" width="260" height="40" rx="5" fill="#1C2330" stroke="#30363D"/>
    <text x="818" y="318" class="dim">(here sn3 = mainline, no change)</text>
  </g>

  <path d="M540 198 C 420 230, 360 250, 300 290" fill="none" stroke="#6E7681" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <path d="M660 198 C 790 230, 880 250, 920 290" fill="none" stroke="#6E7681" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#arr)"/>

  <rect x="320" y="420" width="560" height="120" rx="8" fill="#10182B" stroke="#1F6FEB" stroke-width="1.5"/>
  <text x="346" y="452" class="h" font-size="18" font-weight="700">diff aggregation: identical &#177; cancel, the rest is the diff</text>
  <text x="346" y="486" class="mono m" font-size="15">INSERTED = 1   &#183;   UPDATED = 1000   &#183;   DELETED = 0</text>
  <text x="346" y="516" class="dim" font-size="14">100M rows in the table, but only these two small &#916;s are scanned &#8594; ~20 ms</text>

  <path d="M280 380 C 320 405, 350 410, 380 418" fill="none" stroke="#6E7681" stroke-width="1.3" marker-end="url(#arr)"/>
  <path d="M930 350 C 910 400, 870 410, 830 418" fill="none" stroke="#6E7681" stroke-width="1.3" marker-end="url(#arr)"/>
</svg>
