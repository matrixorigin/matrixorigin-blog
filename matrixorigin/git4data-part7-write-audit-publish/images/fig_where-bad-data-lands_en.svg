<svg viewBox="0 0 1200 430" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#161B22" stroke-width="1"/></pattern>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0L7 3L0 6Z" fill="#6E7681"/></marker>
    <marker id="arrR" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0L7 3L0 6Z" fill="#F0883E"/></marker>
    <style>.h{fill:#E6EDF3;} .m{fill:#9DA7B3;} .dim{fill:#6E7681;}</style>
  </defs>
  <rect width="1200" height="430" fill="#0D1117"/><rect width="1200" height="430" fill="url(#g)"/>
  <text x="60" y="44" class="h" font-size="23" font-weight="700">Two worlds: where does the bad data actually land?</text>

  <!-- ===== LANE 1: load then check ===== -->
  <text x="60" y="88" fill="#F0883E" font-size="16" font-weight="700">① Load then check</text>
  <text x="272" y="88" class="dim" font-size="13">— bad data enters prod and is read downstream before you scramble</text>

  <rect x="60" y="108" width="140" height="62" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
  <text x="130" y="134" class="h" font-size="12.5" text-anchor="middle" font-weight="700">new batch</text>
  <text x="130" y="152" class="dim" font-size="11.5" text-anchor="middle">(dirty)</text>

  <line x1="200" y1="139" x2="248" y2="139" stroke="#F0883E" stroke-width="1.7" marker-end="url(#arrR)"/>
  <rect x="252" y="108" width="196" height="62" rx="8" fill="#2A1413" stroke="#6E2B25" stroke-width="1.6"/>
  <text x="350" y="134" class="h" font-size="12.5" text-anchor="middle" font-weight="700">prod table events</text>
  <text x="350" y="152" fill="#F0883E" font-size="11.5" text-anchor="middle">dirty rows mixed in 💥</text>

  <line x1="448" y1="139" x2="496" y2="139" stroke="#F0883E" stroke-width="1.7" marker-end="url(#arrR)"/>
  <rect x="500" y="108" width="156" height="62" rx="8" fill="#161B22" stroke="#6E2B25" stroke-width="1.4"/>
  <text x="578" y="134" class="h" font-size="12.5" text-anchor="middle" font-weight="700">downstream</text>
  <text x="578" y="152" fill="#F0883E" font-size="11.5" text-anchor="middle">already read it</text>

  <line x1="656" y1="139" x2="704" y2="139" stroke="#6E7681" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="708" y="108" width="232" height="62" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
  <text x="824" y="134" class="h" font-size="12.5" text-anchor="middle" font-weight="700">noticed in the morning</text>
  <text x="824" y="152" class="dim" font-size="11.5" text-anchor="middle">→ rollback / incident rescue (Part 5)</text>

  <line x1="60" y1="210" x2="1140" y2="210" stroke="#21262D" stroke-width="1"/>

  <!-- ===== LANE 2: WAP ===== -->
  <text x="60" y="256" fill="#3FB950" font-size="16" font-weight="700">② WAP: Write-Audit-Publish</text>
  <text x="360" y="256" class="dim" font-size="13">— bad data stops at the gate; prod only ever serves clean data</text>

  <rect x="60" y="278" width="140" height="62" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
  <text x="130" y="304" class="h" font-size="12.5" text-anchor="middle" font-weight="700">new batch</text>
  <text x="130" y="322" class="dim" font-size="11.5" text-anchor="middle">(dirty)</text>

  <line x1="200" y1="309" x2="248" y2="309" stroke="#6E7681" stroke-width="1.6" marker-end="url(#arr)"/>
  <rect x="252" y="278" width="150" height="62" rx="8" fill="#161B22" stroke="#8957E5" stroke-width="1.5"/>
  <text x="327" y="304" fill="#A371F7" font-size="12.5" text-anchor="middle" font-weight="700">staging branch</text>
  <text x="327" y="322" class="dim" font-size="11.5" text-anchor="middle">isolated, not prod</text>

  <line x1="402" y1="309" x2="440" y2="309" stroke="#6E7681" stroke-width="1.6" marker-end="url(#arr)"/>
  <rect x="444" y="278" width="150" height="62" rx="8" fill="#10233F" stroke="#1F6FEB" stroke-width="1.6"/>
  <text x="519" y="304" fill="#79C0FF" font-size="12.5" text-anchor="middle" font-weight="700">audit gate</text>
  <text x="519" y="322" class="dim" font-size="11.5" text-anchor="middle">fail → drop branch</text>

  <!-- barrier -->
  <line x1="648" y1="268" x2="648" y2="350" stroke="#F0883E" stroke-width="3" stroke-dasharray="6 4"/>
  <text x="648" y="262" fill="#F0883E" font-size="20" text-anchor="middle" font-weight="700">✗</text>
  <text x="648" y="372" fill="#F0883E" font-size="11.5" text-anchor="middle">bad data stops here</text>
  <line x1="596" y1="309" x2="640" y2="309" stroke="#F0883E" stroke-width="1.7" marker-end="url(#arrR)"/>

  <!-- clean prod, separate -->
  <rect x="902" y="278" width="200" height="62" rx="8" fill="#10231A" stroke="#3FB950" stroke-width="1.7"/>
  <text x="1002" y="304" class="h" font-size="12.5" text-anchor="middle" font-weight="700">prod table events</text>
  <text x="1002" y="322" fill="#3FB950" font-size="11.5" text-anchor="middle">always clean ✓ · reads stay clean</text>
  <text x="775" y="313" class="dim" font-size="12" text-anchor="middle">(only an audited batch</text>
  <text x="775" y="331" class="dim" font-size="12" text-anchor="middle">is published in, atomically)</text>
</svg>
