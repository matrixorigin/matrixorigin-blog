<svg viewBox="0 0 1200 430" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#161B22" stroke-width="1"/></pattern>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0L6 3L0 6Z" fill="#6E7681"/></marker>
    <marker id="arrL" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0L7 3L0 6Z" fill="#79C0FF"/></marker>
    <style>.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;} .h{fill:#E6EDF3;} .m{fill:#9DA7B3;} .dim{fill:#6E7681;}</style>
  </defs>
  <rect width="1200" height="430" fill="#0D1117"/><rect width="1200" height="430" fill="url(#g)"/>
  <text x="44" y="42" class="h" font-size="22" font-weight="700">机器学习数据全流程 × MatrixOne Git4Data：每一步该用哪个能力</text>

  <!-- 8 stage boxes -->
  <g>
    <!-- box template: rect + stage + capability + part -->
    <!-- 1 接入 -->
    <rect x="44" y="88" width="118" height="82" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
    <text x="103" y="116" class="h" font-size="13" text-anchor="middle" font-weight="700">接入</text>
    <text x="103" y="139" fill="#79C0FF" font-size="10.5" text-anchor="middle">WAP 门禁</text>
    <!-- 2 清洗 -->
    <rect x="186" y="88" width="118" height="82" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
    <text x="245" y="116" class="h" font-size="13" text-anchor="middle" font-weight="700">清洗</text>
    <text x="245" y="139" fill="#3FB950" font-size="10.5" text-anchor="middle">分支 + DIFF</text>
    <!-- 3 标注 -->
    <rect x="328" y="88" width="118" height="82" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
    <text x="387" y="116" class="h" font-size="13" text-anchor="middle" font-weight="700">标注</text>
    <text x="387" y="139" fill="#79C0FF" font-size="10.5" text-anchor="middle">MERGE 裁决</text>
    <!-- 4 策展 -->
    <rect x="470" y="88" width="118" height="82" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
    <text x="529" y="116" class="h" font-size="13" text-anchor="middle" font-weight="700">策展</text>
    <text x="529" y="139" fill="#3FB950" font-size="10.5" text-anchor="middle">diff + snapshot</text>
    <!-- 5 特征 -->
    <rect x="612" y="88" width="118" height="82" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
    <text x="671" y="116" class="h" font-size="13" text-anchor="middle" font-weight="700">特征</text>
    <text x="671" y="139" fill="#A371F7" font-size="10.5" text-anchor="middle">分支 + snapshot</text>
    <!-- 6 训练 -->
    <rect x="754" y="88" width="118" height="82" rx="8" fill="#10231A" stroke="#3FB950" stroke-width="1.5"/>
    <text x="813" y="116" class="h" font-size="13" text-anchor="middle" font-weight="700">训练</text>
    <text x="813" y="139" fill="#A371F7" font-size="10.5" text-anchor="middle">snapshot</text>
    <!-- 7 评估 -->
    <rect x="896" y="88" width="118" height="82" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
    <text x="955" y="116" class="h" font-size="13" text-anchor="middle" font-weight="700">评估</text>
    <text x="955" y="139" fill="#3FB950" font-size="10.5" text-anchor="middle">snapshot + diff</text>
    <!-- 8 监控·再训练 -->
    <rect x="1038" y="88" width="118" height="82" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
    <text x="1097" y="112" class="h" font-size="12.5" text-anchor="middle" font-weight="700">监控·再训练</text>
    <text x="1097" y="135" fill="#F0883E" font-size="10.5" text-anchor="middle">diff + PITR</text>
  </g>

  <!-- arrows between boxes -->
  <g stroke="#6E7681" stroke-width="1.5">
    <line x1="163" y1="129" x2="184" y2="129" marker-end="url(#arr)"/>
    <line x1="305" y1="129" x2="326" y2="129" marker-end="url(#arr)"/>
    <line x1="447" y1="129" x2="468" y2="129" marker-end="url(#arr)"/>
    <line x1="589" y1="129" x2="610" y2="129" marker-end="url(#arr)"/>
    <line x1="731" y1="129" x2="752" y2="129" marker-end="url(#arr)"/>
    <line x1="873" y1="129" x2="894" y2="129" marker-end="url(#arr)"/>
    <line x1="1015" y1="129" x2="1036" y2="129" marker-end="url(#arr)"/>
  </g>
  <text x="1025" y="80" class="dim" font-size="10" text-anchor="middle">上线</text>

  <!-- retrain loop -->
  <path d="M1097 170 C 1097 232, 813 232, 813 172" fill="none" stroke="#79C0FF" stroke-width="1.7" stroke-dasharray="6 4" marker-end="url(#arrL)"/>
  <text x="955" y="228" fill="#79C0FF" font-size="12" text-anchor="middle" font-weight="700">新数据回流 · 下一轮</text>

  <!-- through-lines band -->
  <rect x="44" y="272" width="1112" height="80" rx="10" fill="#0F1622" stroke="#21262D" stroke-width="1.2"/>
  <text x="60" y="292" class="m" font-size="12.5" font-weight="700">四条主线，穿起每一个环节：</text>
  <text x="150" y="322" fill="#A371F7" font-size="13" text-anchor="middle" font-weight="700">版本 snapshot</text>
  <text x="150" y="340" class="dim" font-size="11" text-anchor="middle">可复现的地基</text>
  <text x="430" y="322" fill="#A371F7" font-size="13" text-anchor="middle" font-weight="700">隔离 branch</text>
  <text x="430" y="340" class="dim" font-size="11" text-anchor="middle">不碰生产 / 主数据集</text>
  <text x="700" y="322" fill="#3FB950" font-size="13" text-anchor="middle" font-weight="700">对比 diff</text>
  <text x="700" y="340" class="dim" font-size="11" text-anchor="middle">变了哪些行</text>
  <text x="980" y="322" fill="#79C0FF" font-size="13" text-anchor="middle" font-weight="700">汇聚·回退 merge / restore / PITR</text>
  <text x="980" y="340" class="dim" font-size="11" text-anchor="middle">并到一起，或退回上一个好版本</text>

  <!-- lakeFS note -->
</svg>
