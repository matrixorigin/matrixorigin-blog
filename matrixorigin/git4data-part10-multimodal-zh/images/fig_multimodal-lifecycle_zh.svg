<svg viewBox="0 0 1200 485" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#161B22" stroke-width="1"/></pattern>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0L6 3L0 6Z" fill="#6E7681"/></marker>
    <marker id="arrP" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0L7 3L0 6Z" fill="#A371F7"/></marker>
    <marker id="arrL" markerWidth="9" markerHeight="9" refX="2" refY="3" orient="auto"><path d="M0 0L7 3L0 6Z" fill="#79C0FF"/></marker>
  </defs>
  <rect width="1200" height="485" fill="#0D1117"/><rect width="1200" height="485" fill="url(#g)"/>
  <text x="44" y="40" fill="#E6EDF3" font-size="22" font-weight="700">多模态数据全流程：字节归 lakeFS，目录归 MatrixOne</text>

  <!-- byte lane (lakeFS) -->
  <rect x="44" y="74" width="1100" height="60" rx="10" fill="#0F1622" stroke="#21262D" stroke-width="1.2"/>
  <text x="60" y="98" fill="#F0883E" font-size="12.5" font-weight="700">字节侧 · lakeFS</text>
  <text x="60" y="118" fill="#6E7681" font-size="11">图 / 音 / 视频本体</text>
  <text x="300" y="110" fill="#9DA7B3" font-size="12" text-anchor="middle">ingest 分支 → pre-merge 校验</text>
  <text x="600" y="110" fill="#9DA7B3" font-size="12" text-anchor="middle">对象照存（不可变对象）</text>
  <rect x="884" y="86" width="120" height="36" rx="6" fill="#10231A" stroke="#3FB950" stroke-width="1.3"/>
  <text x="944" y="109" fill="#3FB950" font-size="12" text-anchor="middle" font-weight="700">lakeFS commit</text>
  <text x="1074" y="110" fill="#6E7681" font-size="11" text-anchor="middle">字节版本</text>

  <!-- pin connector: release box <-> lakeFS commit -->
  <line x1="944" y1="248" x2="944" y2="134" stroke="#A371F7" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arrP)"/>
  <text x="944" y="196" fill="#A371F7" font-size="11.5" text-anchor="middle" font-weight="700">目录快照 × lakeFS commit</text>
  <text x="944" y="212" fill="#6E7681" font-size="10.5" text-anchor="middle">= 可复现训练集</text>

  <!-- catalog lane label -->
  <text x="44" y="240" fill="#79C0FF" font-size="12.5" font-weight="700">目录侧 · MatrixOne（Git4Data 能力）</text>

  <!-- catalog stage boxes -->
  <g>
    <rect x="44"   y="248" width="120" height="82" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
    <text x="104"  y="284" fill="#E6EDF3" font-size="13" text-anchor="middle" font-weight="700">接入</text>
    <text x="104"  y="306" fill="#79C0FF" font-size="10.5" text-anchor="middle">WAP 分支</text>

    <rect x="184"  y="248" width="120" height="82" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
    <text x="244"  y="284" fill="#E6EDF3" font-size="13" text-anchor="middle" font-weight="700">去重</text>
    <text x="244"  y="306" fill="#3FB950" font-size="10.5" text-anchor="middle">GROUP BY hash</text>

    <rect x="324"  y="248" width="120" height="82" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
    <text x="384"  y="284" fill="#E6EDF3" font-size="13" text-anchor="middle" font-weight="700">去污染</text>
    <text x="384"  y="306" fill="#3FB950" font-size="10.5" text-anchor="middle">反连接评测集</text>

    <rect x="464"  y="248" width="120" height="82" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
    <text x="524"  y="284" fill="#E6EDF3" font-size="13" text-anchor="middle" font-weight="700">对齐</text>
    <text x="524"  y="306" fill="#3FB950" font-size="10.5" text-anchor="middle">查断裂对</text>

    <rect x="604"  y="248" width="120" height="82" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
    <text x="664"  y="284" fill="#E6EDF3" font-size="13" text-anchor="middle" font-weight="700">重标注</text>
    <text x="664"  y="306" fill="#A371F7" font-size="10.5" text-anchor="middle">branch · MERGE</text>

    <rect x="744"  y="248" width="120" height="82" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
    <text x="804"  y="284" fill="#E6EDF3" font-size="13" text-anchor="middle" font-weight="700">策展</text>
    <text x="804"  y="306" fill="#79C0FF" font-size="10.5" text-anchor="middle">dataset_membership</text>

    <rect x="884"  y="248" width="120" height="82" rx="8" fill="#10231A" stroke="#3FB950" stroke-width="1.6"/>
    <text x="944"  y="284" fill="#E6EDF3" font-size="13" text-anchor="middle" font-weight="700">发布</text>
    <text x="944"  y="306" fill="#A371F7" font-size="10.5" text-anchor="middle">库级快照</text>

    <rect x="1024" y="248" width="120" height="82" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
    <text x="1084" y="284" fill="#E6EDF3" font-size="13" text-anchor="middle" font-weight="700">训练</text>
    <text x="1084" y="306" fill="#F0883E" font-size="10.5" text-anchor="middle">血缘 + DIFF</text>
  </g>

  <!-- arrows between catalog boxes -->
  <g stroke="#6E7681" stroke-width="1.5">
    <line x1="164"  y1="289" x2="182"  y2="289" marker-end="url(#arr)"/>
    <line x1="304"  y1="289" x2="322"  y2="289" marker-end="url(#arr)"/>
    <line x1="444"  y1="289" x2="462"  y2="289" marker-end="url(#arr)"/>
    <line x1="584"  y1="289" x2="602"  y2="289" marker-end="url(#arr)"/>
    <line x1="724"  y1="289" x2="742"  y2="289" marker-end="url(#arr)"/>
    <line x1="864"  y1="289" x2="882"  y2="289" marker-end="url(#arr)"/>
    <line x1="1004" y1="289" x2="1022" y2="289" marker-end="url(#arr)"/>
  </g>

  <!-- retrain loop -->
  <path d="M1084 330 C 1084 400, 104 400, 104 332" fill="none" stroke="#79C0FF" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrL)"/>
  <text x="594" y="418" fill="#79C0FF" font-size="12" text-anchor="middle" font-weight="700">新数据回流 · 下一轮（新 commit + DIFF）</text>

  <!-- footer note -->
  <text x="44" y="450" fill="#6E7681" font-size="11.5">去重 / 去污染 / 对齐 / 重标注 / 策展 全在目录上用 SQL 完成，不复制一份字节；发布时把目录快照与 lakeFS commit 钉在一起。</text>
</svg>
