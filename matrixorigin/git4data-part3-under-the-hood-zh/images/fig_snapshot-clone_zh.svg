<svg viewBox="0 0 1200 620" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans CJK SC',sans-serif">
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#161B22" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#1F6FEB" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#1F6FEB" stop-opacity="0"/>
    </radialGradient>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0 0L7 3L0 6Z" fill="#6E7681"/>
    </marker>
    <style>
      .mono{font-family:ui-monospace,'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;}
      .h{fill:#E6EDF3;} .m{fill:#9DA7B3;} .dim{fill:#6E7681;}
    </style>
  </defs>

  <rect width="1200" height="620" fill="#0D1117"/>
  <rect width="1200" height="620" fill="url(#g)"/>
  <ellipse cx="600" cy="300" rx="400" ry="260" fill="url(#glow)"/>

  <text x="70" y="74" class="h" font-size="32" font-weight="700">快照与克隆：不搬数据，只动元数据</text>
  <text x="72" y="106" class="mono dim" font-size="16">snapshot records a moment · clone copies object refs</text>

  <!-- three directories -->
  <g>
    <rect x="90" y="160" width="300" height="118" rx="8" fill="#10182B" stroke="#3B66B0" stroke-width="1.5"/>
    <text x="110" y="192" class="h" font-size="19" font-weight="700">表 T（当前）</text>
    <text x="110" y="218" class="mono m" font-size="14">→ obj#1 · obj#2 · obj#3</text>
    <text x="110" y="252" class="dim" font-size="13">对象引用元数据</text>
  </g>
  <g>
    <rect x="450" y="160" width="300" height="118" rx="8" fill="#10182B" stroke="#1F6FEB" stroke-width="1.5"/>
    <text x="470" y="192" class="h" font-size="19" font-weight="700">快照 v1</text>
    <text x="470" y="218" class="mono m" font-size="14">→ obj#1 · obj#2 · obj#3</text>
    <text x="470" y="252" class="dim" font-size="13">= 记录时刻 + 保护这些对象</text>
  </g>
  <g>
    <rect x="810" y="160" width="300" height="118" rx="8" fill="#10182B" stroke="#2EA043" stroke-width="1.5"/>
    <text x="830" y="192" class="h" font-size="19" font-weight="700">克隆 TClone</text>
    <text x="830" y="218" class="mono m" font-size="14">→ obj#1 · obj#2 · obj#3</text>
    <text x="830" y="252" class="dim" font-size="13">复制对象引用，之后独立演化</text>
  </g>

  <!-- shared object pool -->
  <text x="90" y="400" class="dim" font-size="15">底层数据对象（三者共享，一个字节都没复制）</text>
  <g class="mono">
    <rect x="290" y="418" width="150" height="56" rx="6" fill="#1C2330" stroke="#3B66B0"/>
    <text x="320" y="452" class="h" font-size="15">obj #1</text>
    <rect x="470" y="418" width="150" height="56" rx="6" fill="#1C2330" stroke="#3B66B0"/>
    <text x="500" y="452" class="h" font-size="15">obj #2</text>
    <rect x="650" y="418" width="150" height="56" rx="6" fill="#1C2330" stroke="#3B66B0"/>
    <text x="680" y="452" class="h" font-size="15">obj #3</text>
  </g>

  <!-- arrows: all three directories point into the same pool -->
  <path d="M240 280 C 280 360, 330 380, 360 416" fill="none" stroke="#6E7681" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <path d="M600 280 C 580 350, 560 380, 545 416" fill="none" stroke="#6E7681" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <path d="M960 280 C 900 360, 800 390, 730 416" fill="none" stroke="#6E7681" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#arr)"/>

  <text x="90" y="540" class="m" font-size="16">三者指向<tspan class="h" font-weight="700">同一批不可变对象</tspan>——所以克隆 6 亿行只要 <tspan class="h" font-weight="700">0.2 秒、多占 314 KB</tspan>。</text>
  <text x="90" y="568" class="dim" font-size="15">GC 认快照：被引用的对象不回收——创建近零成本；长期持有则占用存储（保留成本）。</text>
</svg>
