  <rect x="328" y="150" width="260" height="196" rx="10" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
  <text x="458" y="180" fill="#E6EDF3" font-size="14" text-anchor="middle" font-weight="700">Container image</text>
  <text x="458" y="201" class="dim" font-size="10.5" text-anchor="middle">runtime</text>
