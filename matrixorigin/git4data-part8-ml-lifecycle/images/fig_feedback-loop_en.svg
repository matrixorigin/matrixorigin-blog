<svg viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#161B22" stroke-width="1"/></pattern>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0L6 3L0 6Z" fill="#6E7681"/></marker>
    <marker id="arrL" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0L7 3L0 6Z" fill="#79C0FF"/></marker>
    <marker id="arrP" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0L7 3L0 6Z" fill="#A371F7"/></marker>
    <style>.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;} .h{fill:#E6EDF3;} .m{fill:#9DA7B3;} .dim{fill:#6E7681;}</style>
  </defs>
  <rect width="1200" height="420" fill="#0D1117"/><rect width="1200" height="420" fill="url(#g)"/>
  <text x="44" y="42" class="h" font-size="22" font-weight="700">ML isn't an assembly line — it's a loop that keeps coming around</text>
  <text x="44" y="68" class="dim" font-size="12.5">Textbooks draw a straight line; a real system returns to the start every round, carrying new data</text>
  <rect x="53" y="100" width="164" height="72" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
  <text x="135" y="143" class="h" font-size="13.5" text-anchor="middle" font-weight="700">Ingest</text>
  <rect x="239" y="100" width="164" height="72" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
  <text x="321" y="143" class="h" font-size="13.5" text-anchor="middle" font-weight="700">Clean · Label</text>
  <rect x="425" y="100" width="164" height="72" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
  <text x="507" y="143" class="h" font-size="13.5" text-anchor="middle" font-weight="700">Features</text>
  <rect x="611" y="100" width="164" height="72" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
  <text x="693" y="143" class="h" font-size="13.5" text-anchor="middle" font-weight="700">Split &amp; release</text>
  <rect x="797" y="100" width="164" height="72" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
  <text x="879" y="143" class="h" font-size="13.5" text-anchor="middle" font-weight="700">Train · Evaluate</text>
  <rect x="983" y="100" width="164" height="72" rx="8" fill="#10231A" stroke="#3FB950" stroke-width="1.5"/>
  <text x="1065" y="143" class="h" font-size="13.5" text-anchor="middle" font-weight="700">Deploy</text>
  <g stroke="#6E7681" stroke-width="1.5">
    <line x1="219" y1="136" x2="237" y2="136" marker-end="url(#arr)"/>
    <line x1="405" y1="136" x2="423" y2="136" marker-end="url(#arr)"/>
    <line x1="591" y1="136" x2="609" y2="136" marker-end="url(#arr)"/>
    <line x1="777" y1="136" x2="795" y2="136" marker-end="url(#arr)"/>
    <line x1="963" y1="136" x2="981" y2="136" marker-end="url(#arr)"/>
  </g>
  <path d="M1065 172 C 1065 262, 135 262, 135 172" fill="none" stroke="#79C0FF" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arrL)"/>
  <text x="600" y="258" fill="#79C0FF" font-size="13" text-anchor="middle" font-weight="700">online prediction &amp; business feedback · new events · new labels · delayed truth · drift → next round</text>
  <rect x="44" y="286" width="1112" height="104" rx="10" fill="#0F1622" stroke="#21262D" stroke-width="1.2"/>
  <text x="60" y="309" class="m" font-size="12.5" font-weight="700">Every time around, at least four kinds of state change:</text>
  <text x="183" y="344" fill="#3FB950" font-size="13" text-anchor="middle" font-weight="700">Samples change</text>
  <text x="183" y="366" class="dim" font-size="10.5" text-anchor="middle">added · deleted · deduped · corrected · taken down</text>
  <text x="461" y="344" fill="#79C0FF" font-size="13" text-anchor="middle" font-weight="700">Labels change</text>
  <text x="461" y="366" class="dim" font-size="10.5" text-anchor="middle">weak→human · disputes re-judged · delayed truth</text>
  <text x="739" y="344" fill="#A371F7" font-size="13" text-anchor="middle" font-weight="700">Features change</text>
  <text x="739" y="366" class="dim" font-size="10.5" text-anchor="middle">windows · definitions · imputation · encodings</text>
  <text x="1017" y="344" fill="#F0883E" font-size="13" text-anchor="middle" font-weight="700">Decisions change</text>
  <text x="1017" y="366" class="dim" font-size="10.5" text-anchor="middle">split rules · hyperparams · code · env · architecture</text>
</svg>
