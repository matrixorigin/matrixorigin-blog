<svg viewBox="0 0 1200 440" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#161B22" stroke-width="1"/></pattern>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0L6 3L0 6Z" fill="#6E7681"/></marker>
    <marker id="arrL" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0L7 3L0 6Z" fill="#79C0FF"/></marker>
    <marker id="arrP" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0L7 3L0 6Z" fill="#A371F7"/></marker>
    <style>.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;} .h{fill:#E6EDF3;} .m{fill:#9DA7B3;} .dim{fill:#6E7681;}</style>
  </defs>
  <rect width="1200" height="440" fill="#0D1117"/><rect width="1200" height="440" fill="url(#g)"/>
  <text x="44" y="42" class="h" font-size="22" font-weight="700">Which layer of the MLOps stack MatrixOne sits on</text>
  <text x="44" y="68" class="dim" font-size="12.5">An honest article also has to say what it does not do</text>
  <rect x="44" y="88" width="1112" height="44" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.3"/>
  <text x="66" y="116" fill="#E6EDF3" font-size="12.5" font-weight="700">Git</text>
  <line x1="372" y1="97" x2="372" y2="123" stroke="#21262D" stroke-width="1.2"/>
  <text x="394" y="116" class="m" font-size="11.5">training code · SQL · feature definitions</text>
  <rect x="44" y="140" width="1112" height="44" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.3"/>
  <text x="66" y="168" fill="#E6EDF3" font-size="12.5" font-weight="700">Container image / lockfile</text>
  <line x1="372" y1="149" x2="372" y2="175" stroke="#21262D" stroke-width="1.2"/>
  <text x="394" y="168" class="m" font-size="11.5">Python · CUDA · system dependencies</text>
  <rect x="44" y="192" width="1112" height="44" rx="8" fill="#10231A" stroke="#3FB950" stroke-width="1.6"/>
  <text x="66" y="220" fill="#3FB950" font-size="12.5" font-weight="700">MatrixOne Git4Data</text>
  <line x1="372" y1="201" x2="372" y2="227" stroke="#21262D" stroke-width="1.2"/>
  <text x="394" y="220" class="m" font-size="11.5">structured samples · labels · feature values: snapshot / branch / row-level diff · merge · pick / restore</text>
  <rect x="44" y="244" width="1112" height="44" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.3"/>
  <text x="66" y="272" fill="#E6EDF3" font-size="12.5" font-weight="700">lakeFS · object store · DVC</text>
  <line x1="372" y1="253" x2="372" y2="279" stroke="#21262D" stroke-width="1.2"/>
  <text x="394" y="272" class="m" font-size="11.5">images · audio · video · model weights (MatrixOne keeps only URI and hash)</text>
  <rect x="44" y="296" width="1112" height="44" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.3"/>
  <text x="66" y="324" fill="#E6EDF3" font-size="12.5" font-weight="700">Airflow · Kubeflow · Ray</text>
  <line x1="372" y1="305" x2="372" y2="331" stroke="#21262D" stroke-width="1.2"/>
  <text x="394" y="324" class="m" font-size="11.5">training orchestration and resources; Git4Data only feeds it stable data versions</text>
  <rect x="44" y="348" width="1112" height="44" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.3"/>
  <text x="66" y="376" fill="#E6EDF3" font-size="12.5" font-weight="700">MLflow · model registry</text>
  <line x1="372" y1="357" x2="372" y2="383" stroke="#21262D" stroke-width="1.2"/>
  <text x="394" y="376" class="m" font-size="11.5">experiment metrics and artifacts, completed by dataset_snapshot + split lineage</text>
  <text x="600" y="424" fill="#79C0FF" font-size="12.5" text-anchor="middle" font-weight="700">Each layer does its own job — no single tool does all of MLOps</text>
</svg>
