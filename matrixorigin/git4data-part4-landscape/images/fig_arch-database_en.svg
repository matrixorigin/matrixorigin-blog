<svg viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#161B22" stroke-width="1"/></pattern>
    <style>.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;} .h{fill:#E6EDF3;} .m{fill:#9DA7B3;} .dim{fill:#6E7681;}</style>
  </defs>
  <rect width="1200" height="480" fill="#0D1117"/><rect width="1200" height="480" fill="url(#g)"/>
  <text x="70" y="52" class="h" font-size="24" font-weight="700">Category 4: in-database version control</text>
  <text x="72" y="78" class="dim" font-size="14">version control lives inside the database kernel — it understands every row and stores changes as immutable increments</text>

  <!-- Col 1: Dolt -->
  <rect x="60" y="100" width="340" height="296" rx="10" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
  <rect x="60" y="100" width="340" height="44" rx="10" fill="#1C2330"/>
  <text x="80" y="129" class="h" font-size="17" font-weight="700">Dolt</text>
  <text x="372" y="127" class="dim" font-size="12" text-anchor="end">deepest git</text>
  <g class="m" font-size="13"><text x="80" y="176">· single-node · MySQL-compatible</text>
    <text x="80" y="206">· Merkle / prolly-tree storage</text>
    <text x="80" y="236">· cell-level diff / merge</text>
    <text x="80" y="266">· blame · push · pull</text>
    <text x="80" y="296">· DoltHub (hosted remote)</text></g>
  <text x="80" y="356" class="dim" font-size="12.5">cost: OLTP-leaning · single-node ·</text>
  <text x="80" y="376" class="dim" font-size="12.5">weak analytics</text>

  <!-- Col 2: Snowflake / Neon -->
  <rect x="430" y="100" width="340" height="296" rx="10" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
  <rect x="430" y="100" width="340" height="44" rx="10" fill="#1C2330"/>
  <text x="450" y="129" class="h" font-size="17" font-weight="700">Snowflake / Neon</text>
  <text x="742" y="127" class="dim" font-size="12" text-anchor="end">first half only</text>
  <g class="m" font-size="13"><text x="450" y="176">· cloud storage · copy-on-write</text>
    <text x="450" y="206">· zero-copy clone / db branch</text>
    <text x="450" y="236">· time travel / PITR</text></g>
  <g font-size="13" fill="#F0883E"><text x="450" y="266">· ✗ no row-level merge</text>
    <text x="450" y="296">· ✗ no row-level diff</text></g>
  <text x="450" y="356" class="dim" font-size="12.5">can clone and go back in time,</text>
  <text x="450" y="376" class="dim" font-size="12.5">but nothing merges back</text>

  <!-- Col 3: MatrixOne (highlight) -->
  <rect x="800" y="100" width="340" height="296" rx="10" fill="#10233F" stroke="#1F6FEB" stroke-width="2"/>
  <rect x="800" y="100" width="340" height="44" rx="10" fill="#163056"/>
  <text x="820" y="129" class="h" font-size="17" font-weight="700">MatrixOne</text>
  <text x="1120" y="127" font-size="12" fill="#79C0FF" text-anchor="end">most complete row-level git</text>
  <g class="m" font-size="12.5"><text x="820" y="174">· CN · TN · LogService · S3</text>
    <text x="820" y="202">· distributed · MySQL-compatible</text></g>
  <g font-size="12.5" fill="#C9D7E6"><text x="820" y="232">· row-level snapshot / branch</text>
    <text x="820" y="260">· row-level diff / merge + conflict</text>
    <text x="820" y="288">· PICK · RESTORE · PITR</text></g>
  <text x="820" y="356" fill="#79C0FF" font-size="12.5">snapshot / PITR span:</text>
  <text x="820" y="376" fill="#79C0FF" font-size="12.5">table &#8594; db &#8594; tenant &#8594; cluster</text>

  <rect x="60" y="416" width="1080" height="46" rx="8" fill="#10182B" stroke="#1F6FEB" stroke-width="1.2"/>
  <text x="600" y="444" class="m" font-size="14" text-anchor="middle">in common: version control sits in the database kernel —— <tspan class="h" font-weight="700">a version is a table you can SELECT / JOIN directly</tspan></text>
</svg>
