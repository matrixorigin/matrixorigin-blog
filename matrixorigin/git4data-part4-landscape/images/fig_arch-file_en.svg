<svg viewBox="0 0 1200 440" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#161B22" stroke-width="1"/></pattern>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0L7 3L0 6Z" fill="#6E7681"/></marker>
    <style>.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;} .h{fill:#E6EDF3;} .m{fill:#9DA7B3;} .dim{fill:#6E7681;}</style>
  </defs>
  <rect width="1200" height="440" fill="#0D1117"/><rect width="1200" height="440" fill="url(#g)"/>
  <text x="70" y="56" class="h" font-size="24" font-weight="700">Category 1: Git-native file versioning (DVC / Git LFS)</text>

  <rect x="70" y="100" width="440" height="230" rx="10" fill="#10182B" stroke="#1F6FEB" stroke-width="1.5"/>
  <text x="92" y="136" class="h" font-size="18" font-weight="700">Git repo　<tspan class="dim" font-size="13" font-weight="400">version control lives here</tspan></text>
  <rect x="92" y="156" width="396" height="40" rx="5" fill="#161B22" stroke="#30363D"/><text x="106" y="181" class="m mono" font-size="13">train.parquet.dvc　&#8594; md5 a1b2…</text>
  <rect x="92" y="204" width="396" height="40" rx="5" fill="#161B22" stroke="#30363D"/><text x="106" y="229" class="m mono" font-size="13">model.pkl.dvc　　&#8594; md5 c3d4…</text>
  <rect x="92" y="252" width="396" height="40" rx="5" fill="#161B22" stroke="#30363D"/><text x="106" y="277" class="dim mono" font-size="13">code / dvc.yaml / CI</text>

  <rect x="690" y="100" width="440" height="230" rx="10" fill="#10182B" stroke="#3B66B0" stroke-width="1.5"/>
  <text x="712" y="136" class="h" font-size="18" font-weight="700">Remote cache (S3 / OSS)　<tspan class="dim" font-size="13" font-weight="400">bytes</tspan></text>
  <rect x="712" y="156" width="396" height="56" rx="5" fill="#1C2330" stroke="#3B66B0"/><text x="726" y="180" class="h mono" font-size="13">a1b2…</text><text x="726" y="200" class="dim mono" font-size="12">train.parquet · 1.2 GB · immutable</text>
  <rect x="712" y="220" width="396" height="56" rx="5" fill="#1C2330" stroke="#3B66B0"/><text x="726" y="244" class="h mono" font-size="13">c3d4…</text><text x="726" y="264" class="dim mono" font-size="12">model.pkl · 840 MB · immutable</text>

  <line x1="510" y1="176" x2="690" y2="184" stroke="#30363D" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="510" y1="224" x2="690" y2="248" stroke="#30363D" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="600" y="168" class="dim" font-size="12.5" text-anchor="middle">pointer &#8594; bytes</text>

  <rect x="70" y="356" width="1060" height="48" rx="8" fill="#10233F" stroke="#1F6FEB" stroke-width="1.2"/>
  <text x="600" y="386" class="m" font-size="14.5" text-anchor="middle">version = a Git commit of the <tspan class="h" font-weight="700">pointer files</tspan>　·　granularity = <tspan class="h" font-weight="700">file</tspan>　·　the data itself never enters diff / merge</text>
</svg>
