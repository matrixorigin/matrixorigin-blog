<svg viewBox="0 0 1200 485" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#161B22" stroke-width="1"/></pattern>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0L6 3L0 6Z" fill="#6E7681"/></marker>
    <marker id="arrP" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0L7 3L0 6Z" fill="#A371F7"/></marker>
    <marker id="arrL" markerWidth="9" markerHeight="9" refX="2" refY="3" orient="auto"><path d="M0 0L7 3L0 6Z" fill="#79C0FF"/></marker>
  </defs>
  <rect width="1200" height="485" fill="#0D1117"/><rect width="1200" height="485" fill="url(#g)"/>
  <text x="44" y="40" fill="#E6EDF3" font-size="22" font-weight="700">The training-data lifecycle: files to lakeFS, metadata to MatrixOne</text>

  <!-- byte lane (lakeFS) -->
  <rect x="44" y="74" width="1100" height="60" rx="10" fill="#0F1622" stroke="#21262D" stroke-width="1.2"/>
  <text x="60" y="98" fill="#F0883E" font-size="12.5" font-weight="700">File side · lakeFS</text>
  <text x="60" y="118" fill="#6E7681" font-size="11">image / audio / video bodies</text>
  <text x="310" y="110" fill="#9DA7B3" font-size="12" text-anchor="middle">ingest branch → pre-merge checks</text>
  <text x="610" y="110" fill="#9DA7B3" font-size="12" text-anchor="middle">objects stored as-is (immutable)</text>
  <rect x="884" y="86" width="120" height="36" rx="6" fill="#10231A" stroke="#3FB950" stroke-width="1.3"/>
  <text x="944" y="109" fill="#3FB950" font-size="12" text-anchor="middle" font-weight="700">lakeFS commit</text>
  <text x="1074" y="110" fill="#6E7681" font-size="11" text-anchor="middle">file version</text>

  <!-- pin connector: release box <-> lakeFS commit -->
  <line x1="944" y1="248" x2="944" y2="134" stroke="#A371F7" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arrP)"/>
  <text x="944" y="196" fill="#A371F7" font-size="11.5" text-anchor="middle" font-weight="700">metadata snapshot × lakeFS commit</text>
  <text x="944" y="212" fill="#6E7681" font-size="10.5" text-anchor="middle">= reproducible training set</text>

  <!-- metadata lane label -->
  <text x="44" y="240" fill="#79C0FF" font-size="12.5" font-weight="700">Metadata side · MatrixOne (Git4Data capability)</text>

  <!-- metadata stage boxes -->
  <g>
    <rect x="44"   y="248" width="120" height="82" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
    <text x="104"  y="284" fill="#E6EDF3" font-size="12.5" text-anchor="middle" font-weight="700">Ingest</text>
    <text x="104"  y="306" fill="#79C0FF" font-size="10.5" text-anchor="middle">WAP branch</text>

    <rect x="184"  y="248" width="120" height="82" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
    <text x="244"  y="284" fill="#E6EDF3" font-size="12.5" text-anchor="middle" font-weight="700">Dedup</text>
    <text x="244"  y="306" fill="#3FB950" font-size="10.5" text-anchor="middle">GROUP BY hash</text>

    <rect x="324"  y="248" width="120" height="82" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
    <text x="384"  y="278" fill="#E6EDF3" font-size="12.5" text-anchor="middle" font-weight="700">Decontam-</text>
    <text x="384"  y="293" fill="#E6EDF3" font-size="12.5" text-anchor="middle" font-weight="700">inate</text>
    <text x="384"  y="313" fill="#3FB950" font-size="10.5" text-anchor="middle">anti-join eval</text>

    <rect x="464"  y="248" width="120" height="82" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
    <text x="524"  y="284" fill="#E6EDF3" font-size="12.5" text-anchor="middle" font-weight="700">Integrity</text>
    <text x="524"  y="306" fill="#3FB950" font-size="10.5" text-anchor="middle">null label / dangling</text>

    <rect x="604"  y="248" width="120" height="82" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
    <text x="664"  y="284" fill="#E6EDF3" font-size="12.5" text-anchor="middle" font-weight="700">Relabel</text>
    <text x="664"  y="306" fill="#A371F7" font-size="10.5" text-anchor="middle">branch · MERGE</text>

    <rect x="744"  y="248" width="120" height="82" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
    <text x="804"  y="284" fill="#E6EDF3" font-size="12.5" text-anchor="middle" font-weight="700">Curate</text>
    <text x="804"  y="306" fill="#79C0FF" font-size="9.5" text-anchor="middle">dataset_membership</text>

    <rect x="884"  y="248" width="120" height="82" rx="8" fill="#10231A" stroke="#3FB950" stroke-width="1.6"/>
    <text x="944"  y="284" fill="#E6EDF3" font-size="12.5" text-anchor="middle" font-weight="700">Release</text>
    <text x="944"  y="306" fill="#A371F7" font-size="10.5" text-anchor="middle">db snapshot</text>

    <rect x="1024" y="248" width="120" height="82" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
    <text x="1084" y="284" fill="#E6EDF3" font-size="12.5" text-anchor="middle" font-weight="700">Train</text>
    <text x="1084" y="306" fill="#F0883E" font-size="10.5" text-anchor="middle">lineage + DIFF</text>
  </g>

  <!-- arrows between metadata boxes -->
  <g stroke="#6E7681" stroke-width="1.5">
    <line x1="164"  y1="289" x2="182"  y2="289" marker-end="url(#arr)"/>
    <line x1="304"  y1="289" x2="322"  y2="289" marker-end="url(#arr)"/>
    <line x1="444"  y1="289" x2="462"  y2="289" marker-end="url(#arr)"/>
    <line x1="584"  y1="289" x2="602"  y2="289" marker-end="url(#arr)"/>
    <line x1="724"  y1="289" x2="742"  y2="289" marker-end="url(#arr)"/>
    <line x1="864"  y1="289" x2="882"  y2="289" marker-end="url(#arr)"/>
    <line x1="1004" y1="289" x2="1022" y2="289" marker-end="url(#arr)"/>
  </g>

  <!-- retrain loop -->
  <path d="M1084 330 C 1084 400, 104 400, 104 332" fill="none" stroke="#79C0FF" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrL)"/>
  <text x="594" y="418" fill="#79C0FF" font-size="12" text-anchor="middle" font-weight="700">new data flows back · next round (new commit + DIFF)</text>

  <!-- footer note -->
  <text x="44" y="450" fill="#6E7681" font-size="11.5">Dedup / decontamination / integrity / relabel / curation all run as SQL on the metadata — no file is copied; at release, the metadata snapshot is pinned to the lakeFS commit.</text>
</svg>
