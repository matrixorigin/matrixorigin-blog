<svg viewBox="0 0 1200 460" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#161B22" stroke-width="1"/></pattern>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0L7 3L0 6Z" fill="#6E7681"/></marker>
    <style>.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;} .h{fill:#E6EDF3;} .m{fill:#9DA7B3;} .dim{fill:#6E7681;}</style>
  </defs>
  <rect width="1200" height="460" fill="#0D1117"/><rect width="1200" height="460" fill="url(#g)"/>
  <text x="70" y="56" class="h" font-size="24" font-weight="700">种类二：对象存储的 git-for-data（lakeFS / Pachyderm）</text>

  <!-- top: external engines -->
  <rect x="70" y="92" width="1060" height="58" rx="9" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
  <text x="92" y="118" class="h" font-size="15" font-weight="700">外部引擎</text>
  <text x="92" y="138" class="dim" font-size="13">Spark / Trino / DuckDB —— 指向某个分支路径来读数（计算不在 lakeFS）</text>

  <!-- middle: lakeFS server + KV -->
  <rect x="70" y="172" width="1060" height="110" rx="9" fill="#10182B" stroke="#1F6FEB" stroke-width="1.5"/>
  <text x="92" y="200" class="h" font-size="16" font-weight="700">lakeFS Server　＋　元数据 KV（PostgreSQL / DynamoDB）</text>
  <text x="92" y="222" class="dim" font-size="12.5">只管版本元数据：commit / branch / merge / revert，作用于整个仓库</text>
  <!-- branch graph -->
  <circle cx="300" cy="252" r="7" fill="#1F6FEB"/><text x="300" y="276" class="m mono" font-size="12" text-anchor="middle">main</text>
  <line x1="307" y1="252" x2="440" y2="252" stroke="#30363D" stroke-width="1.5"/>
  <circle cx="447" cy="252" r="7" fill="#79C0FF"/><text x="447" y="276" class="m mono" font-size="12" text-anchor="middle">feature</text>
  <text x="640" y="256" class="dim" font-size="12.5">每个分支 = 指向一批对象的指针集合</text>

  <!-- bottom: object storage -->
  <rect x="70" y="304" width="1060" height="86" rx="9" fill="#10182B" stroke="#3B66B0" stroke-width="1.5"/>
  <text x="92" y="332" class="h" font-size="16" font-weight="700">对象存储 S3 / OSS　<tspan class="dim" font-size="12.5" font-weight="400">字节都在这里</tspan></text>
  <g font-size="12" class="dim mono">
    <rect x="92" y="346" width="120" height="32" rx="4" fill="#1C2330" stroke="#3B66B0"/><text x="152" y="367" text-anchor="middle">obj #1</text>
    <rect x="224" y="346" width="120" height="32" rx="4" fill="#1C2330" stroke="#3B66B0"/><text x="284" y="367" text-anchor="middle">obj #2</text>
    <rect x="356" y="346" width="120" height="32" rx="4" fill="#1C2330" stroke="#3B66B0"/><text x="416" y="367" text-anchor="middle">obj #3</text>
    <rect x="488" y="346" width="120" height="32" rx="4" fill="#1C2330" stroke="#3B66B0"/><text x="548" y="367" text-anchor="middle">obj #4 (parquet)</text>
    <rect x="620" y="346" width="120" height="32" rx="4" fill="#1C2330" stroke="#3B66B0"/><text x="680" y="367" text-anchor="middle">obj #5 (image)</text>
    <text x="760" y="367">……</text>
  </g>

  <!-- connectors -->
  <line x1="600" y1="150" x2="600" y2="172" stroke="#30363D" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="600" y1="282" x2="600" y2="304" stroke="#30363D" stroke-width="1.4" marker-end="url(#arr)"/>

  <text x="1108" y="430" class="m" font-size="13.5" text-anchor="end">版本 = 整仓库 commit　·　粒度 = <tspan class="h" font-weight="700">对象（整文件）</tspan>　·　计算在外部引擎</text>
</svg>
