<svg viewBox="0 0 1200 470" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#161B22" stroke-width="1"/></pattern>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0L7 3L0 6Z" fill="#6E7681"/></marker>
    <style>.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;} .h{fill:#E6EDF3;} .m{fill:#9DA7B3;} .dim{fill:#6E7681;}</style>
  </defs>
  <rect width="1200" height="470" fill="#0D1117"/><rect width="1200" height="470" fill="url(#g)"/>
  <text x="70" y="56" class="h" font-size="24" font-weight="700">种类三：表格式 + git 分支（Iceberg / Delta + Nessie）</text>

  <!-- external engines -->
  <rect x="70" y="92" width="1060" height="56" rx="9" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
  <text x="92" y="118" class="h" font-size="15" font-weight="700">外部引擎</text>
  <text x="92" y="137" class="dim" font-size="13">Spark / Trino / Flink / Dremio —— 查询、合并都在这里执行（表格式自己不计算）</text>

  <!-- Nessie catalog -->
  <rect x="70" y="170" width="500" height="96" rx="9" fill="#10182B" stroke="#1F6FEB" stroke-width="1.5"/>
  <text x="92" y="198" class="h" font-size="16" font-weight="700">Nessie catalog</text>
  <text x="92" y="219" class="dim" font-size="12.5">git 式分支 / 标签 / 合并，跨多张表一起 commit</text>
  <circle cx="110" cy="244" r="6" fill="#1F6FEB"/><text x="124" y="248" class="m mono" font-size="12">main</text>
  <line x1="170" y1="244" x2="250" y2="244" stroke="#30363D" stroke-width="1.4"/>
  <circle cx="256" cy="244" r="6" fill="#79C0FF"/><text x="270" y="248" class="m mono" font-size="12">etl</text>
  <text x="330" y="248" class="dim" font-size="11.5">合并 = 表快照级（content-key 冲突）</text>

  <!-- table format metadata -->
  <rect x="610" y="170" width="520" height="96" rx="9" fill="#10182B" stroke="#3B66B0" stroke-width="1.5"/>
  <text x="632" y="198" class="h" font-size="16" font-weight="700">表格式元数据（Iceberg / Delta）</text>
  <g font-size="12" class="m mono">
    <rect x="632" y="214" width="120" height="36" rx="5" fill="#1C2330" stroke="#3B66B0"/><text x="692" y="237" text-anchor="middle">snapshot s1</text>
    <rect x="772" y="214" width="120" height="36" rx="5" fill="#1C2330" stroke="#3B66B0"/><text x="832" y="237" text-anchor="middle">snapshot s2</text>
    <rect x="912" y="214" width="120" height="36" rx="5" fill="#1C2330" stroke="#3B66B0"/><text x="972" y="237" text-anchor="middle">snapshot s3</text>
  </g>
  <line x1="752" y1="232" x2="772" y2="232" stroke="#6E7681" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="892" y1="232" x2="912" y2="232" stroke="#6E7681" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- data files -->
  <rect x="70" y="288" width="1060" height="86" rx="9" fill="#10182B" stroke="#3B66B0" stroke-width="1.5"/>
  <text x="92" y="316" class="h" font-size="16" font-weight="700">数据文件（Parquet / ORC）@ 对象存储</text>
  <g font-size="12" class="dim mono">
    <rect x="92" y="330" width="150" height="32" rx="4" fill="#1C2330" stroke="#3B66B0"/><text x="167" y="351" text-anchor="middle">part-0001.parquet</text>
    <rect x="254" y="330" width="150" height="32" rx="4" fill="#1C2330" stroke="#3B66B0"/><text x="329" y="351" text-anchor="middle">part-0002.parquet</text>
    <rect x="416" y="330" width="150" height="32" rx="4" fill="#1C2330" stroke="#3B66B0"/><text x="491" y="351" text-anchor="middle">part-0003.parquet</text>
    <text x="586" y="351">……</text>
  </g>

  <line x1="600" y1="148" x2="600" y2="170" stroke="#30363D" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="600" y1="266" x2="600" y2="288" stroke="#30363D" stroke-width="1.4" marker-end="url(#arr)"/>

  <text x="1108" y="416" class="m" font-size="13.5" text-anchor="end">版本 = <tspan class="h" font-weight="700">表快照</tspan>　·　合并 = 表快照级　·　计算在外部引擎</text>
</svg>
