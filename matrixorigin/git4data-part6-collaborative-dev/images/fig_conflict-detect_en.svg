<svg viewBox="0 0 1200 470" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#161B22" stroke-width="1"/></pattern>
    <style>.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;} .h{fill:#E6EDF3;} .m{fill:#9DA7B3;} .dim{fill:#6E7681;}</style>
  </defs>
  <rect width="1200" height="470" fill="#0D1117"/><rect width="1200" height="470" fill="url(#g)"/>
  <text x="70" y="50" class="h" font-size="24" font-weight="700">Conflicts are detected per row: only "same row, both sides" is a true conflict</text>

  <!-- LEFT: false conflict -->
  <rect x="70" y="92" width="500" height="320" rx="10" fill="#161B22" stroke="#2D6A45" stroke-width="1.5"/>
  <text x="92" y="122" class="h" font-size="17" font-weight="700">Different rows → false conflict</text>
  <text x="92" y="144" fill="#3FB950" font-size="13">auto-merged, nobody involved</text>
  <g class="mono" font-size="13.5">
    <rect x="92" y="160" width="456" height="36" rx="4" fill="#10231A" stroke="#2D6A45"/><text x="106" y="183">user 41　Alice → monetary　<tspan fill="#3FB950">✓ merged</tspan></text>
    <rect x="92" y="202" width="456" height="36" rx="4" fill="#161B22" stroke="#30363D"/><text x="106" y="225" class="dim">user 42　(nobody)</text>
    <rect x="92" y="244" width="456" height="36" rx="4" fill="#10231A" stroke="#2D6A45"/><text x="106" y="267">user 43　Bob → label　<tspan fill="#3FB950">✓ merged</tspan></text>
  </g>
  <text x="92" y="322" class="m" font-size="14" font-weight="700">the two sides touched different rows →</text>
  <text x="92" y="348" fill="#3FB950" font-size="14" font-weight="700">both changes auto-merge, zero coordination</text>

  <!-- RIGHT: true conflict -->
  <rect x="630" y="92" width="500" height="320" rx="10" fill="#161B22" stroke="#6E2B25" stroke-width="1.5"/>
  <text x="652" y="122" class="h" font-size="17" font-weight="700">Same row → true conflict</text>
  <text x="652" y="144" fill="#F0883E" font-size="13">you must adjudicate (FAIL/SKIP/ACCEPT)</text>
  <g class="mono" font-size="13.5">
    <rect x="652" y="170" width="456" height="36" rx="4" fill="#2A1413" stroke="#6E2B25"/><text x="666" y="193" fill="#79C0FF">user 42　Alice → monetary=11.00</text>
    <rect x="652" y="212" width="456" height="36" rx="4" fill="#2A1413" stroke="#6E2B25"/><text x="666" y="235" fill="#D2A8FF">user 42　Bob → monetary=22.00</text>
  </g>
  <text x="881" y="290" fill="#F0883E" font-size="24" font-weight="700" text-anchor="middle">⚡ collision</text>
  <text x="652" y="330" class="m" font-size="14" font-weight="700">same row changed by both sides →</text>
  <text x="652" y="356" fill="#F0883E" font-size="14" font-weight="700">the DB surfaces it and waits for your call</text>
  <text x="652" y="384" class="dim" font-size="12">(even different columns of the same row count as a conflict)</text>
</svg>
