<svg viewBox="0 0 1200 440" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#161B22" stroke-width="1"/></pattern>
    <style>.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;} .h{fill:#E6EDF3;} .m{fill:#9DA7B3;} .dim{fill:#6E7681;}</style>
  </defs>
  <rect width="1200" height="440" fill="#0D1117"/><rect width="1200" height="440" fill="url(#g)"/>
  <text x="70" y="46" class="h" font-size="23" font-weight="700">Rows processed per round: full retrain vs incremental (6 rounds)</text>

  <!-- axes -->
  <line x1="120" y1="340" x2="1080" y2="340" stroke="#30363D" stroke-width="1.5"/>
  <line x1="120" y1="90" x2="120" y2="340" stroke="#30363D" stroke-width="1.5"/>
  <text x="104" y="100" class="dim" font-size="11" text-anchor="end">rows</text>

  <g>
    <rect x="154" y="300" width="42" height="40"  fill="#F0883E" opacity="0.9"/>
    <rect x="204" y="300" width="42" height="40"  fill="#3FB950" opacity="0.9"/>
    <text x="200" y="360" class="dim" font-size="12" text-anchor="middle">round 1</text>
    <rect x="314" y="260" width="42" height="80"  fill="#F0883E" opacity="0.9"/>
    <rect x="364" y="300" width="42" height="40"  fill="#3FB950" opacity="0.9"/>
    <text x="360" y="360" class="dim" font-size="12" text-anchor="middle">round 2</text>
    <rect x="474" y="220" width="42" height="120" fill="#F0883E" opacity="0.9"/>
    <rect x="524" y="300" width="42" height="40"  fill="#3FB950" opacity="0.9"/>
    <text x="520" y="360" class="dim" font-size="12" text-anchor="middle">round 3</text>
    <rect x="634" y="180" width="42" height="160" fill="#F0883E" opacity="0.9"/>
    <rect x="684" y="300" width="42" height="40"  fill="#3FB950" opacity="0.9"/>
    <text x="680" y="360" class="dim" font-size="12" text-anchor="middle">round 4</text>
    <rect x="794" y="140" width="42" height="200" fill="#F0883E" opacity="0.9"/>
    <rect x="844" y="300" width="42" height="40"  fill="#3FB950" opacity="0.9"/>
    <text x="840" y="360" class="dim" font-size="12" text-anchor="middle">round 5</text>
    <rect x="954" y="100" width="42" height="240" fill="#F0883E" opacity="0.9"/>
    <text x="975" y="92" fill="#F0883E" font-size="11" text-anchor="middle">6000</text>
    <rect x="1004" y="300" width="42" height="40" fill="#3FB950" opacity="0.9"/>
    <text x="1025" y="292" fill="#3FB950" font-size="11" text-anchor="middle">1000</text>
    <text x="1000" y="360" class="dim" font-size="12" text-anchor="middle">round 6</text>
  </g>

  <rect x="150" y="386" width="18" height="14" fill="#F0883E"/>
  <text x="176" y="398" class="m" font-size="13">Full retrain (whole table each round) → cumulative <tspan class="h" font-weight="700">21,000</tspan> rows</text>
  <rect x="640" y="386" width="18" height="14" fill="#3FB950"/>
  <text x="666" y="398" class="m" font-size="13">Incremental (only this round's change) → cumulative <tspan class="h" font-weight="700">6,004</tspan> rows</text>

  <text x="1080" y="200" fill="#F0883E" font-size="13" text-anchor="end" font-weight="700">↑ cumulative grows quadratically</text>
  <text x="1080" y="322" fill="#3FB950" font-size="13" text-anchor="end" font-weight="700">incremental stays ~1000/round</text>
</svg>
