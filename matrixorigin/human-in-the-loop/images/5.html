    <script>
        const pageFlow = document.getElementById('pageFlow');

        const agentBranchHTML = `
<p>我先开一个临时调查分支，不写 group main</p>
<p><span class="branch-line">branch: incident/dev-upgrade-20260514-oncall</span></p>
<p>先从现象查，不先假设代码问题。你说的是“应用连不上”，我先看 dev/freetier 最近的连接失败、ERROR 密度和异常 pod 分布</p>`;

        const agentLogHTML = `
<p>先有范围了</p>
<p>异常主要集中在 freetier-01，最突出的 pod 是：</p>
<div class="log-block">namespace=freetier-01
pod=freetier-01-s2-56c954c888-cn-h7627
time=2026-05-14 10:47Z 附近</div>
<p>我先看连接失败附近的高频日志，不直接搜源码</p>
<p>高频日志里有一个模式很明显：<code>service_upgrade_tenant</code> 在刷屏</p>
<p>我把查询收窄到：</p>
<div class="log-block">{namespace="freetier-01"} |~ "get upgrading tenant version|load upgrade tenants|3.0.0 -> 3.0.1"</div>
<p>结果是 1 分钟约 17,468 条，主要来自 cn-h7627</p>
<p>关键样本：</p>
<div class="log-block">caller=bootstrap/service_upgrade_tenant.go:154
msg="get upgrading tenant version"
upgrade="0th: 3.0.0 -> 3.0.1 (false, true, 1155, 1154), state 1"
has=true

caller=bootstrap/service_upgrade_tenant.go:179
msg="load upgrade tenants"
count=0
upgrade="0th: 3.0.0 -> 3.0.1 (false, true, 1155, 1154), state 1"</div>
<p>这里先记录事实：不是普通连接抖动，升级框架确实在高频刷 3.0.0 -> 3.0.1</p>
<p>这串 upgrade 里最可疑的是 1155、1154 和 count=0 的组合</p>`;

        const agentCodeHTML = `
<p>我现在回头看对应代码含义</p>
<p>相关文件集中在：</p>
<div class="metric-list">pkg/bootstrap/service_upgrade_tenant.go
pkg/bootstrap/versions/version_upgrade.go
pkg/bootstrap/versions/upgrade_tenant_task.go
pkg/bootstrap/versions/v3_0_1/upgrade.go
pkg/bootstrap/versions/v3_0_1/tenant_upgrade_list.go</div>
<p>v3_0_1 是 tenant upgrade，不是单次 cluster upgrade。它会给每个 tenant 检查并创建 mo_branch_metadata、mo_role_rule 这两张 catalog 表</p>
<p>字段含义对上了</p>
<div class="metric-list">TotalTenant=1155 表示这个 step 认为有 1155 个 tenant 要升级
ReadyTenant=1154 表示已经完成 1154 个
state=1 表示还处在 StateUpgradingTenant
count=0 表示这一轮没有加载到待执行的 tenant task</div>
<p>这个状态不自然</p>
<p>如果只是慢，应该还有 pending task。如果真的做完了，ReadyTenant 应该等于 TotalTenant。现在是“账面还差一个，但任务已经拿不到”</p>
<p>我继续看为什么这个状态会影响连接</p>
<p>后台有 asyncUpgradeTenantTask，会定时查 GetUpgradingTenantVersion 和 GetUpgradeTenantTasks。新连接也可能走 MaybeUpgradeTenant / execute upgrade query</p>
<p>所以 upgrade 没 ready 的时候，不只是后台刷日志，新进来的连接也可能撞到升级检查</p>
<p>再看 GetUpgradeTenantTasks，它会从 mo_upgrade_tenant 取 task range，然后去 mo_account 里拿这个 range 内的 account，并且是 for update</p>
<p>也就是说，只要这个路径被反复触发，就会持续制造 mo_account 附近的事务和锁压力</p>`;

        const agentSignalHTML = `
<p>我现在查连接失败同期的其它信号</p>
<p>查到的不是单一 upgrade 日志，还有这些：</p>
<div class="metric-list">failed to execute upgrade query
found orphans txns
failed to lock
failed to unlock
no route to host
disconnect from CN server</div>
<p>样本：</p>
<div class="log-block">caller=lockservice/service_remote.go:535
msg="found orphans txns"
txns="[8c717a9131524f9118af6b5c83558f2d]"

caller=morpc/backend.go:906
msg="error: can not connect to remote backend, dial tcp4 172.20.10.140:6003: connect: no route to host"

caller=lockservice/lock_table_remote.go:120
msg="failed to lock on remote"

caller=lockservice/lock_table_remote.go:159
msg="txn failed to unlock table on remote"</div>
<p>这说明应用连不上时，CN 间通信、lockservice、事务清理也已经异常</p>
<p>我又看了一下同窗口的量级</p>
<div class="metric-list">upgrade loop 还在刷
lock errors 是数百级
disconnects 是千级
ERROR logs 是数千级
orphan txn 有样本</div>
<p>这能支持一个方向：升级状态卡住之后，连接路径和后台升级路径一起制造事务/锁压力；CN 异常以后，又留下 orphan txn 或 stale binding，继续放大连接失败</p>`;

        const agentConclusionHTML = `
<p>但是这里还有一个硬缺口：我还没有解释为什么会出现 TotalTenant=1155、ReadyTenant=1154、count=0</p>
<p>所以现在不能把根因写死</p>
<p>我先给阶段性结论，只写在 branch 里</p>
<p><span class="emphasis">定位：</span></p>
<div class="metric-list">namespace: freetier-01
pod: freetier-01-s2-56c954c888-cn-h7627
卡住 step: 3.0.0 -> 3.0.1
异常状态: TotalTenant=1155, ReadyTenant=1154, state=1, count=0

                <div class="title-bar">
                    <div class="title-main">
                        <span>${segment.title}</span>
                        <span class="title-tag">${segment.tag}</span>
                    </div>

            const rightBody = stage.querySelector('[data-pane="right"]');

                chatBody: leftBody || stage.querySelector('.chat-area'),
                leftBody,

        function clearTimers(state, advanceRun = true) {
            if (advanceRun) state.runId += 1;
            state.timers.forEach(timer => clearTimeout(timer));
            state.timers = [];
        }

        function delay(state, ms, runId) {
            return new Promise(resolve => {
                const timer = setTimeout(() => {
                    resolve(runId === state.runId);
                }, ms);
                state.timers.push(timer);
            });
        }

        function createTimestamp(state, text) {
            const ts = document.createElement('div');
            ts.className = 'timestamp';
            ts.textContent = text;
            state.chatBody.appendChild(ts);
        }

        function createSystemNote(state, text) {
            if (!text) return;
            const note = document.createElement('div');
            note.className = 'system-note';
            note.textContent = text;
            state.chatBody.appendChild(note);
        }

        function createMessage(state, message) {
            const row = document.createElement('div');
            row.className = `msg-row ${message.side}${message.shot ? ` shot-${message.shot}` : ''}`;

            const avatar = document.createElement('div');
            avatar.className = `avatar ${message.avatarClass}`;
            avatar.textContent = message.avatar;

            const stack = document.createElement('div');
            stack.className = 'msg-stack';

            const sender = document.createElement('div');
            sender.className = 'sender';
            sender.textContent = message.role;

            const bubble = document.createElement('div');
            bubble.className = 'bubble' + (message.kind === 'agent' ? ' agent-output' : '');

            stack.appendChild(sender);
            stack.appendChild(bubble);
            row.appendChild(avatar);
            row.appendChild(stack);
            state.chatBody.appendChild(row);
            state.lastRow = row;

            return { row, bubble };
        }

        function showRow(state, row) {
            requestAnimationFrame(() => {
                row.classList.add('visible');
                scrollToBottom(state);
            });

            if (state.pendingScroll) return;
            state.pendingScroll = true;
            requestAnimationFrame(() => {
                state.pendingScroll = false;
                state.chatBody.scrollTop = state.chatBody.scrollHeight;
            });
        }

        function forceScrollToBottom(state) {
            state.pendingScroll = false;
            state.chatBody.scrollTop = state.chatBody.scrollHeight;
            requestAnimationFrame(() => {
                state.chatBody.scrollTop = state.chatBody.scrollHeight;
                requestAnimationFrame(() => {
                    state.chatBody.scrollTop = state.chatBody.scrollHeight;
                });
            });
        }

        function settleOnLastMessage(state) {
            if (!state.lastRow) return;
            state.pendingScroll = false;
            const computeTarget = () => {
                const containerRect = state.chatBody.getBoundingClientRect();
                const rowRect = state.lastRow.getBoundingClientRect();
                const rawTarget = state.chatBody.scrollTop + rowRect.top - containerRect.top - 16;
                const maxTarget = Math.max(0, state.chatBody.scrollHeight - state.chatBody.clientHeight);
                return Math.min(Math.max(0, rawTarget), maxTarget);
            };
            const scrollToLast = () => {
                state.chatBody.scrollTop = computeTarget();
            };
            scrollToLast();
            requestAnimationFrame(() => {
                scrollToLast();
                requestAnimationFrame(scrollToLast);
            });
        }

        function showTyping(bubble) {
            bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
        }

        function escapeHTML(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function typewriterHTML(state, bubble, html, speed, runId, charsPerTickOverride = null) {
            return new Promise(resolve => {
                const temp = document.createElement('div');
                temp.innerHTML = html;

                const segments = [];
                function walk(node) {
                    if (node.nodeType === Node.TEXT_NODE) {
                        for (const char of node.textContent) {
                            segments.push({ type: 'char', char });
                        }
                    } else if (node.nodeType === Node.ELEMENT_NODE) {
                        const attrs = [];
                        for (let i = 0; i < node.attributes.length; i++) {
                            attrs.push({ name: node.attributes[i].name, value: node.attributes[i].value });
                        }
                        segments.push({ type: 'open', tag: node.tagName.toLowerCase(), attrs });
                        for (const child of node.childNodes) walk(child);
                        segments.push({ type: 'close', tag: node.tagName.toLowerCase() });
                    }
                }

                for (const child of temp.childNodes) walk(child);

                bubble.innerHTML = '';
                const content = document.createElement('span');
                bubble.appendChild(content);

                let built = '';
                let index = 0;
                const cursor = '<span class="tw-cursor"></span>';
                const charsPerTick = charsPerTickOverride ?? (html.length > 9000 ? 8 : 4);

                function appendSegment(segment) {
                    if (segment.type === 'char') {
                        built += escapeHTML(segment.char);
                        return 1;
                    }
                    if (segment.type === 'open') {
                        const attrs = segment.attrs.map(attr => ` ${attr.name}="${escapeHTML(attr.value)}"`).join('');
                        built += `<${segment.tag}${attrs}>`;
                        return 0;
                    }
                    if (segment.type === 'close') {
                        built += `</${segment.tag}>`;
                    }
                    return 0;
                }

                function step() {
                    if (runId !== state.runId) {
                        resolve(false);
                        return;
                    }
                    if (index >= segments.length) {
                        content.innerHTML = built;
                        scrollToBottom(state);
                        resolve(true);
                        return;
                    }

                    let chars = 0;
                    while (index < segments.length && chars < charsPerTick) {
                        chars += appendSegment(segments[index]);
                        index += 1;
                    }

                    content.innerHTML = built + cursor;
                    scrollToBottom(state);
                    const timer = setTimeout(step, speed);
                    state.timers.push(timer);
                }

                step();
            });
        }

        async function renderMessage(state, message, immediate = false, runId = state.runId) {
            if (runId !== state.runId) return false;
            if (message.kind === 'note') {
                createSystemNote(state, message.text);
                scrollToBottom(state);
                return true;
            }

            const { row, bubble } = createMessage(state, message);

            if (message.kind === 'agent' && !immediate) {
                showTyping(bubble);
                showRow(state, row);
                if (!await delay(state, 650, runId)) return false;
                return await typewriterHTML(state, bubble, message.html, message.speed ?? 10, runId, message.charsPerTick ?? null);
            }

            if (message.kind === 'agent') {
                bubble.innerHTML = message.html;
            } else {
                bubble.textContent = message.text;
            }
            showRow(state, row);
            return true;
        }

        function getPauseAfter(message) {
            if (message.pauseAfter !== undefined) return message.pauseAfter;
            if (message.kind === 'agent') return 520;
            const baseline = Array.from('我这边翻到一段引擎日志').length;
            const length = Math.max(1, Array.from(message.text || '').length);
            return Math.round(900 * length / baseline);
        }

        async function startWindow(state, restart = false) {
            if (state.segment.layout === 'split') {
                await startSplitWindow(state);
                return;
            }
            clearTimers(state);
            const runId = state.runId;
            state.started = true;
            state.done = false;
            state.chatBody.innerHTML = '';
            state.lastRow = null;
            state.playButton.disabled = true;
            state.playButton.textContent = '播放中';

            const segment = state.segment;
            createTimestamp(state, segment.timestamp);
            createSystemNote(state, segment.note);

            if (!await delay(state, 220, runId)) {
                state.playButton.disabled = false;
                state.playButton.textContent = '播放/重播';
                return;
            }
            for (const message of segment.messages) {
                if (runId !== state.runId) {
                    state.playButton.disabled = false;
                    state.playButton.textContent = '播放/重播';
                    return;
                }
                const rendered = await renderMessage(state, message, false, runId);
                if (!rendered || runId !== state.runId) {
                    state.playButton.disabled = false;
                    state.playButton.textContent = '播放/重播';
                    return;
                }
                if (!await delay(state, getPauseAfter(message), runId)) {
                    state.playButton.disabled = false;
                    state.playButton.textContent = '播放/重播';
                    return;
                }
            }
            if (runId === state.runId) {
                state.done = true;
                state.timers = [];
                settleOnLastMessage(state);
                state.playButton.disabled = false;
                state.playButton.textContent = '播放/重播';
            }
        }

        async function playMessages(state, messages, runId) {
            for (const message of messages) {
                if (runId !== state.runId) return false;
                const rendered = await renderMessage(state, message, false, runId);
                if (!rendered || runId !== state.runId) return false;
                if (!await delay(state, getPauseAfter(message), runId)) return false;
            }
            return true;
        }

        async function startSplitWindow(state) {
            clearTimers(state);
            const runId = state.runId;
            state.started = true;
            state.done = false;
            state.leftBody.innerHTML = '';
            state.rightBody.innerHTML = '';
            state.lastRow = null;
            state.playButton.disabled = true;
            state.playButton.textContent = '播放中';

            const segment = state.segment;
            state.chatBody = state.leftBody;
            createTimestamp(state, segment.timestamp);
            createSystemNote(state, segment.leftNote);
            if (!await delay(state, 220, runId)) {
                state.playButton.disabled = false;
                state.playButton.textContent = '播放/重播';
                return;
            }
            const leftDone = await playMessages(state, segment.leftMessages, runId);
            if (!leftDone || runId !== state.runId) {
                state.playButton.disabled = false;
                state.playButton.textContent = '播放/重播';
                return;
            }

            await delay(state, 900, runId);
            state.chatBody = state.rightBody;
            state.lastRow = null;
            createTimestamp(state, '回到群里');
            createSystemNote(state, segment.rightNote);
            if (!await delay(state, 260, runId)) {
                state.playButton.disabled = false;
                state.playButton.textContent = '播放/重播';
                return;
            }
            const rightDone = await playMessages(state, segment.rightMessages, runId);
            if (!rightDone || runId !== state.runId) {
                state.playButton.disabled = false;
                state.playButton.textContent = '播放/重播';
                return;
            }

            state.done = true;
            state.timers = [];
            settleOnLastMessage(state);
            state.playButton.disabled = false;
            state.playButton.textContent = '播放/重播';
        }

        function skipWindow(state) {
            clearTimers(state);
            const runId = state.runId;
            state.started = true;
            state.done = true;
            if (state.segment.layout === 'split') {
                state.leftBody.innerHTML = '';
                state.rightBody.innerHTML = '';
            } else {
                state.chatBody.innerHTML = '';
            }
            state.lastRow = null;
            state.playButton.disabled = false;
            state.playButton.textContent = '播放/重播';

            const segment = state.segment;
            if (segment.layout === 'split') {
                state.chatBody = state.leftBody;
                createTimestamp(state, segment.timestamp);
                createSystemNote(state, segment.leftNote);
                for (const message of segment.leftMessages) {
                    renderMessage(state, message, true, runId);
                }
                state.chatBody = state.rightBody;
                createTimestamp(state, '回到群里');
                createSystemNote(state, segment.rightNote);
                for (const message of segment.rightMessages) {
                    renderMessage(state, message, true, runId);
                }
            } else {
                createTimestamp(state, segment.timestamp);
                createSystemNote(state, segment.note);
                for (const message of segment.messages) {
                    renderMessage(state, message, true, runId);
                }
            }
            settleOnLastMessage(state);
        }

        const requestedSegment = 5;
        const visibleSegments = Number.isInteger(requestedSegment) && requestedSegment >= 1 && requestedSegment <= segments.length
            ? [segments[requestedSegment - 1]]
            : segments;

        const windowStates = visibleSegments.map(createWindow);

        windowStates.forEach(state => {
            state.playButton.addEventListener('click', () => startWindow(state, true));
            state.skipButton.addEventListener('click', () => skipWindow(state));
        });
    </script>
