<svg viewBox="0 0 1100 660" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans CJK SC',sans-serif">
  <defs>
    <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#161B22" stroke-width="1"/>
    </pattern>
    <filter id="glow3" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .mono{font-family:ui-monospace,'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;}
      .h{fill:#E6EDF3;} .m{fill:#9DA7B3;} .dim{fill:#6E7681;}
      .chip{fill:none;stroke:#58A6FF;}
      .chiptx{fill:#58A6FF;}
    </style>
  </defs>

  <rect width="1100" height="660" fill="#0D1117"/>
  <rect width="1100" height="660" fill="url(#grid3)"/>

  <text x="70" y="68" class="h" font-size="30" font-weight="700">Git4Data：自我进化 AI Agent 的数据底座</text>
  <text x="72" y="100" class="mono dim" font-size="15">the version-control layer beneath self-evolving agents</text>

  <!-- center connector -->
  <path d="M550 250 V600" stroke="#30363D" stroke-width="2"/>

  <!-- tier 1: agents -->
  <rect x="150" y="140" width="800" height="110" rx="14" fill="#161B22" stroke="#30363D"/>
  <text x="185" y="203" class="h" font-size="24" font-weight="600">自我进化的 AI Agent</text>
  <g>
    <rect class="chip" x="520" y="178" width="92" height="36" rx="18"/>
    <text class="mono chiptx" x="566" y="201" text-anchor="middle" font-size="14">MLOps</text>
    <rect class="chip" x="624" y="178" width="150" height="36" rx="18"/>
    <text class="chiptx" x="699" y="201" text-anchor="middle" font-size="14">Agent 自进化</text>
    <rect class="chip" x="786" y="178" width="140" height="36" rx="18"/>
    <text class="chiptx" x="856" y="201" text-anchor="middle" font-size="14">Memory 管理</text>
  </g>

  <!-- arrow -->
  <path d="M550 250 l-8 -10 h16 z" fill="#30363D"/>

  <!-- tier 2: Git4Data (hero) -->
  <rect x="120" y="300" width="860" height="132" rx="16" fill="#0E2A18" stroke="#3FB950" stroke-width="2.5" filter="url(#glow3)"/>
  <text x="160" y="362" class="h" font-size="32" font-weight="700">Git4Data</text>
  <text x="160" y="392" class="mono" font-size="15" fill="#3FB950">海量数据上的版本控制原语</text>
  <text x="160" y="416" class="mono h" font-size="15">commit · branch · diff · merge · cherry-pick · restore</text>
  <text x="940" y="362" text-anchor="end" class="m" font-size="14">行级</text>
  <text x="940" y="386" text-anchor="end" class="m" font-size="14">秒级</text>
  <text x="940" y="410" text-anchor="end" class="m" font-size="14">零拷贝</text>

  <!-- tier 3: MatrixOne -->
  <rect x="150" y="482" width="800" height="110" rx="14" fill="#161B22" stroke="#30363D"/>
  <text x="185" y="545" class="h" font-size="24" font-weight="600">MatrixOne</text>
  <text x="930" y="545" text-anchor="end" class="mono m" font-size="15">TB+ 海量 · MySQL 兼容 · 云原生 HTAP</text>

  <text x="550" y="636" text-anchor="middle" class="m" font-size="16">数据可版本化，是 AI Agent 能安全自进化的前提</text>
</svg>
