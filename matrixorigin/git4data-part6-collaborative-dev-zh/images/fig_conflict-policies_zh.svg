<svg viewBox="0 0 1200 470" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#161B22" stroke-width="1"/></pattern>
    <style>.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;} .h{fill:#E6EDF3;} .m{fill:#9DA7B3;} .dim{fill:#6E7681;}</style>
  </defs>
  <rect width="1200" height="470" fill="#0D1117"/><rect width="1200" height="470" fill="url(#g)"/>
  <text x="70" y="48" class="h" font-size="24" font-weight="700">三种冲突裁决：Bob 合入主线（42 号与 Alice 撞车，20 号不冲突）</text>
  <text x="72" y="74" class="dim" font-size="13">主线现状：行 42 = Alice 的 11.00　·　Bob 分支：行 42 → 22.00（冲突），行 20 → label=1（不冲突）</text>

  <!-- FAIL -->
  <rect x="60" y="96" width="346" height="320" rx="10" fill="#161B22" stroke="#6E2B25" stroke-width="1.5"/>
  <text x="82" y="126" class="h" font-size="17" font-weight="700">FAIL（默认）</text>
  <text x="82" y="148" fill="#F0883E" font-size="12.5">一遇冲突，整个合并回滚</text>
  <g class="mono" font-size="13">
    <rect x="82" y="166" width="302" height="34" rx="4" fill="#2A1413" stroke="#6E2B25"/><text x="96" y="188" fill="#F0883E">user 42　11.00（没变）</text>
    <rect x="82" y="206" width="302" height="34" rx="4" fill="#2A1413" stroke="#6E2B25"/><text x="96" y="228" fill="#F0883E">user 20　未合入 ✗</text>
  </g>
  <text x="82" y="286" class="m" font-size="13.5" font-weight="700">全有或全无：</text>
  <text x="82" y="310" class="dim" font-size="12.5">主线一行未动，连不冲突的</text>
  <text x="82" y="328" class="dim" font-size="12.5">20 号也没进——逼你先解决</text>

  <!-- SKIP -->
  <rect x="426" y="96" width="346" height="320" rx="10" fill="#10233F" stroke="#1F6FEB" stroke-width="1.6"/>
  <text x="448" y="126" class="h" font-size="17" font-weight="700">SKIP</text>
  <text x="448" y="148" fill="#79C0FF" font-size="12.5">只跳过冲突行，其余照常合</text>
  <g class="mono" font-size="13">
    <rect x="448" y="166" width="302" height="34" rx="4" fill="#102338" stroke="#1F6FEB"/><text x="462" y="188" fill="#79C0FF">user 42　11.00（保留 Alice）</text>
    <rect x="448" y="206" width="302" height="34" rx="4" fill="#10231A" stroke="#2D6A45"/><text x="462" y="228" fill="#3FB950">user 20　label=1（Bob 合入 ✓）</text>
  </g>
  <text x="448" y="286" class="m" font-size="13.5" font-weight="700">冲突的让位、其余照走：</text>
  <text x="448" y="310" class="dim" font-size="12.5">只有真撞上的 42 号被跳过，</text>
  <text x="448" y="328" class="dim" font-size="12.5">分支里其它改动正常合入</text>

  <!-- ACCEPT -->
  <rect x="792" y="96" width="346" height="320" rx="10" fill="#10233F" stroke="#1F6FEB" stroke-width="1.6"/>
  <text x="814" y="126" class="h" font-size="17" font-weight="700">ACCEPT</text>
  <text x="814" y="148" fill="#79C0FF" font-size="12.5">冲突行采用分支值，其余照合</text>
  <g class="mono" font-size="13">
    <rect x="814" y="166" width="302" height="34" rx="4" fill="#102338" stroke="#1F6FEB"/><text x="828" y="188" fill="#D2A8FF">user 42　22.00（采用 Bob）</text>
    <rect x="814" y="206" width="302" height="34" rx="4" fill="#10231A" stroke="#2D6A45"/><text x="828" y="228" fill="#3FB950">user 20　label=1（Bob 合入 ✓）</text>
  </g>
  <text x="814" y="286" class="m" font-size="13.5" font-weight="700">分支赢：</text>
  <text x="814" y="310" class="dim" font-size="12.5">冲突行 42 用 Bob 的 22.00，</text>
  <text x="814" y="328" class="dim" font-size="12.5">其余改动也一并合入</text>

  <text x="600" y="448" class="dim" font-size="13" text-anchor="middle">另有 cherry-pick：DATA BRANCH PICK … KEYS (…) —— 只把指定的几行挑到主线</text>
</svg>
