<svg viewBox="0 0 1200 460" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#161B22" stroke-width="1"/></pattern>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0L7 3L0 6Z" fill="#6E7681"/></marker>
    <marker id="arrb" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0L7 3L0 6Z" fill="#1F6FEB"/></marker>
    <style>.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;} .h{fill:#E6EDF3;} .m{fill:#9DA7B3;} .dim{fill:#6E7681;}</style>
  </defs>
  <rect width="1200" height="460" fill="#0D1117"/><rect width="1200" height="460" fill="url(#g)"/>
  <text x="70" y="50" class="h" font-size="23" font-weight="700">Two safety nets: durable manual snapshots + a rolling background PITR</text>

  <!-- timeline -->
  <line x1="110" y1="220" x2="1130" y2="220" stroke="#30363D" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="1128" y="206" class="dim" font-size="12" text-anchor="end">time →</text>

  <!-- now -->
  <line x1="1050" y1="135" x2="1050" y2="330" stroke="#9DA7B3" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="1050" y="348" class="m" font-size="12" text-anchor="middle" font-weight="700">now</text>

  <!-- rolled-off zone (left of the window) -->
  <rect x="300" y="250" width="418" height="66" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="509" y="279" class="dim" font-size="12.5" text-anchor="middle" font-weight="700">rolled out of the window</text>
  <text x="509" y="300" class="dim" font-size="11.5" text-anchor="middle">PITR no longer guarantees recovery here</text>

  <!-- PITR rolling window -->
  <rect x="722" y="250" width="328" height="66" rx="8" fill="#10233F" stroke="#1F6FEB" stroke-width="1.6"/>
  <text x="886" y="279" fill="#79C0FF" font-size="13.5" font-weight="700" text-anchor="middle">PITR rolling window (last 1 day = RANGE)</text>
  <text x="886" y="300" class="dim" font-size="11.5" text-anchor="middle">any second inside is recoverable — even a drop</text>
  <!-- trailing edge of window -->
  <line x1="722" y1="244" x2="722" y2="322" stroke="#1F6FEB" stroke-width="1.4" stroke-dasharray="3 3"/>
  <text x="722" y="338" fill="#79C0FF" font-size="11" text-anchor="middle">now − 1 day</text>
  <!-- window slides forward -->
  <line x1="812" y1="338" x2="900" y2="338" stroke="#1F6FEB" stroke-width="1.3" marker-end="url(#arrb)" opacity="0.85"/>
  <text x="966" y="342" fill="#79C0FF" font-size="11.5" text-anchor="middle">keeps rolling forward</text>

  <!-- snapshot label -->
  <text x="470" y="126" fill="#A371F7" font-size="12" text-anchor="middle">CREATE SNAPSHOT (manual · durable)</text>

  <!-- snapshot 1: rolled-off in time, but still valid -->
  <g>
    <rect x="424" y="138" width="92" height="30" rx="4" fill="#161B22" stroke="#8957E5" stroke-width="1.3"/>
    <text x="470" y="158" class="m" font-size="12" text-anchor="middle">pre-release</text>
    <line x1="470" y1="168" x2="470" y2="220" stroke="#8957E5" stroke-width="1.5"/>
    <circle cx="470" cy="220" r="4" fill="#8957E5"/>
  </g>
  <!-- durability callout -->
  <line x1="470" y1="316" x2="470" y2="356" stroke="#3FB950" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="470" y="374" fill="#3FB950" font-size="12.5" text-anchor="middle" font-weight="700">snapshots don't expire</text>
  <text x="470" y="392" fill="#3FB950" font-size="11" text-anchor="middle">still DIFF-able / restorable after the window rolls past</text>

  <!-- snapshot 2: inside the window -->
  <g>
    <rect x="924" y="138" width="82" height="30" rx="4" fill="#161B22" stroke="#8957E5" stroke-width="1.3"/>
    <text x="965" y="158" class="m" font-size="12" text-anchor="middle">pre-change</text>
    <line x1="965" y1="168" x2="965" y2="220" stroke="#8957E5" stroke-width="1.5"/>
    <circle cx="965" cy="220" r="4" fill="#8957E5"/>
  </g>

  <!-- incident -->
  <circle cx="1015" cy="220" r="8" fill="#F0883E"/>
  <text x="1015" y="200" fill="#F0883E" font-size="13" text-anchor="middle" font-weight="700">incident 💥</text>

  <!-- legend -->
  <rect x="70" y="430" width="20" height="14" rx="3" fill="#161B22" stroke="#8957E5"/>
  <text x="100" y="442" class="m" font-size="12.5">Snapshot = manual, durable, named → <tspan class="h" font-weight="700">surgical repair / DIFF</tspan> (never expires)</text>
  <rect x="690" y="430" width="20" height="14" rx="3" fill="#10233F" stroke="#1F6FEB"/>
  <text x="720" y="442" class="m" font-size="12.5">PITR = background, forward-rolling short-term window → <tspan class="h" font-weight="700">backstop</tspan></text>
</svg>
