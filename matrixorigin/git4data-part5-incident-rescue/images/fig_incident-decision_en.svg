<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#161B22" stroke-width="1"/></pattern>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0L7 3L0 6Z" fill="#6E7681"/></marker>
    <style>.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;} .h{fill:#E6EDF3;} .m{fill:#9DA7B3;} .dim{fill:#6E7681;}</style>
  </defs>
  <rect width="1200" height="600" fill="#0D1117"/><rect width="1200" height="600" fill="url(#g)"/>
  <text x="70" y="50" class="h" font-size="24" font-weight="700">After an incident: follow this decision tree</text>

  <rect x="500" y="74" width="200" height="40" rx="20" fill="#1C2330" stroke="#6E7681"/>
  <text x="600" y="100" class="h" font-size="15" text-anchor="middle" font-weight="700">incident</text>
  <line x1="600" y1="114" x2="600" y2="142" stroke="#6E7681" stroke-width="1.5" marker-end="url(#arr)"/>

  <polygon points="600,146 712,200 600,254 488,200" fill="#161B22" stroke="#1F6FEB" stroke-width="1.5"/>
  <text x="600" y="197" class="h" font-size="14.5" text-anchor="middle" font-weight="700">table still</text>
  <text x="600" y="215" class="h" font-size="14.5" text-anchor="middle" font-weight="700">there?</text>

  <line x1="712" y1="200" x2="888" y2="200" stroke="#6E7681" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="762" y="190" fill="#F0883E" font-size="13" font-weight="700">no (dropped)</text>
  <rect x="890" y="170" width="270" height="60" rx="8" fill="#10233F" stroke="#1F6FEB" stroke-width="1.5"/>
  <text x="908" y="197" class="h" font-size="15" font-weight="700">whole-DB PITR restore</text>
  <text x="908" y="218" class="dim mono" font-size="12">RESTORE DATABASE … FROM PITR</text>

  <line x1="600" y1="254" x2="600" y2="288" stroke="#6E7681" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="614" y="276" fill="#3FB950" font-size="13" font-weight="700">yes</text>
  <rect x="476" y="290" width="248" height="58" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
  <text x="600" y="316" class="h" font-size="15" text-anchor="middle" font-weight="700">DIFF to see the damage</text>
  <text x="600" y="337" class="dim mono" font-size="11.5" text-anchor="middle">DATA BRANCH DIFF … OUTPUT SUMMARY</text>

  <line x1="600" y1="348" x2="600" y2="378" stroke="#6E7681" stroke-width="1.5" marker-end="url(#arr)"/>
  <polygon points="600,382 740,432 600,482 460,432" fill="#161B22" stroke="#1F6FEB" stroke-width="1.5"/>
  <text x="600" y="427" class="h" font-size="14" text-anchor="middle" font-weight="700">legit writes</text>
  <text x="600" y="446" class="h" font-size="14" text-anchor="middle" font-weight="700">after the incident?</text>

  <line x1="460" y1="432" x2="362" y2="432" stroke="#6E7681" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="410" y="422" fill="#9DA7B3" font-size="13" font-weight="700">no</text>
  <rect x="60" y="402" width="300" height="60" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.4"/>
  <text x="78" y="429" class="h" font-size="15" font-weight="700">full rollback (simplest)</text>
  <text x="78" y="450" class="dim mono" font-size="12">RESTORE TABLE … {SNAPSHOT=…}</text>

  <line x1="600" y1="482" x2="600" y2="512" stroke="#6E7681" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="614" y="503" fill="#79C0FF" font-size="13" font-weight="700">yes</text>
  <rect x="420" y="514" width="360" height="62" rx="8" fill="#10233F" stroke="#1F6FEB" stroke-width="1.8"/>
  <text x="438" y="541" class="h" font-size="15" font-weight="700">surgical repair (keep new business)</text>
  <text x="438" y="562" fill="#79C0FF" class="mono" font-size="12">clone snapshot + UPDATE … JOIN</text>

  <rect x="824" y="392" width="328" height="80" rx="8" fill="#1A1410" stroke="#6E2B25" stroke-width="1.2"/>
  <text x="842" y="418" fill="#F0883E" font-size="13" font-weight="700">edge case: no before-snapshot</text>
  <text x="842" y="440" class="dim" font-size="12.5">+ slow corruption → only whole-DB PITR</text>
  <text x="842" y="459" class="dim" font-size="12.5">overwrite (rolls back live business too)</text>
</svg>
