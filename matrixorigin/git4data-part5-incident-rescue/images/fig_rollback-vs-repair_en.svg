<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#161B22" stroke-width="1"/></pattern>
    <style>.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;} .h{fill:#E6EDF3;} .m{fill:#9DA7B3;} .dim{fill:#6E7681;}</style>
  </defs>
  <rect width="1200" height="500" fill="#0D1117"/><rect width="1200" height="500" fill="url(#g)"/>
  <text x="70" y="52" class="h" font-size="24" font-weight="700">Full rollback vs surgical repair (when orders keep coming)</text>
  <text x="72" y="78" class="dim" font-size="13.5">Incident: amount on order ≤ 500 set to 0; afterwards two legit new orders arrive (90001 / 90002)</text>

  <!-- LEFT: full rollback -->
  <rect x="70" y="104" width="510" height="330" rx="10" fill="#161B22" stroke="#F0883E" stroke-width="1.4"/>
  <text x="92" y="134" class="h" font-size="17" font-weight="700">Full rollback　RESTORE TABLE {SNAPSHOT}</text>
  <text x="92" y="158" class="dim" font-size="12.5">whole table pulled back to the snapshot moment</text>
  <g class="mono" font-size="14">
    <rect x="92" y="176" width="466" height="34" rx="4" fill="#10231A" stroke="#2D6A45"/><text x="106" y="198" fill="#3FB950">id 88231  amount 0 → 119　restored ✓</text>
    <rect x="92" y="216" width="466" height="34" rx="4" fill="#10231A" stroke="#2D6A45"/><text x="106" y="238" fill="#3FB950">id 88232  amount 0 → 98 　restored ✓</text>
    <rect x="92" y="262" width="466" height="34" rx="4" fill="#2A1413" stroke="#6E2B25"/><text x="106" y="284" fill="#F0883E">id 90001  new order 250　 gone ✗</text>
    <rect x="92" y="302" width="466" height="34" rx="4" fill="#2A1413" stroke="#6E2B25"/><text x="106" y="324" fill="#F0883E">id 90002  new order 88 　 gone ✗</text>
  </g>
  <text x="92" y="372" fill="#F0883E" font-size="14" font-weight="700">Simple —— but the post-incident orders vanish too</text>
  <text x="92" y="400" class="dim" font-size="12.5">use when: 2 a.m. / table locked / no real writes after</text>

  <!-- RIGHT: surgical repair -->
  <rect x="620" y="104" width="510" height="330" rx="10" fill="#10233F" stroke="#1F6FEB" stroke-width="1.8"/>
  <text x="642" y="134" class="h" font-size="17" font-weight="700">Surgical repair　UPDATE … JOIN snapshot</text>
  <text x="642" y="158" class="dim" font-size="12.5">restore only the damaged rows, touch nothing else</text>
  <g class="mono" font-size="14">
    <rect x="642" y="176" width="466" height="34" rx="4" fill="#10231A" stroke="#2D6A45"/><text x="656" y="198" fill="#3FB950">id 88231  amount 0 → 119　restored ✓</text>
    <rect x="642" y="216" width="466" height="34" rx="4" fill="#10231A" stroke="#2D6A45"/><text x="656" y="238" fill="#3FB950">id 88232  amount 0 → 98 　restored ✓</text>
    <rect x="642" y="262" width="466" height="34" rx="4" fill="#102338" stroke="#1F6FEB"/><text x="656" y="284" fill="#79C0FF">id 90001  new order 250　 kept ✓</text>
    <rect x="642" y="302" width="466" height="34" rx="4" fill="#102338" stroke="#1F6FEB"/><text x="656" y="324" fill="#79C0FF">id 90002  new order 88 　 kept ✓</text>
  </g>
  <text x="642" y="372" fill="#79C0FF" font-size="14" font-weight="700">damaged rows restored + new orders all kept</text>
  <text x="642" y="400" class="dim" font-size="12.5">use when: production is still taking orders — what you want</text>

  <text x="600" y="466" class="m" font-size="13.5" text-anchor="middle">DIFF first to see the damage, then pick between these two — both are just one or two SQL statements</text>
</svg>
